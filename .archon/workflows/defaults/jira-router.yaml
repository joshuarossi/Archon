name: jira-router
description: Route Jira webhook events into placeholder SDLC handlers.

worktree:
  enabled: false

nodes:
  - id: decode
    bash: |
      set -euo pipefail
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing base64 payload in $ARGUMENTS");
        }
        const json = Buffer.from(raw, "base64").toString("utf8");
        const obj = JSON.parse(json);
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"
  - id: route-epic-decompose
    depends_on: [ decode ]
    timeout: 900000
    when: "$decode.output.event == 'transition' && $decode.output.issue_type ==
      'Epic' && $decode.output.from_status == 'Backlog' &&
      $decode.output.to_status == 'Selected for Development'"
    bash: |
      set -euo pipefail
      target_cwd=$decode.output.codebase_cwd
      if [ -z "$target_cwd" ] || [ "$target_cwd" = "null" ]; then
        target_cwd="$PWD"
      fi
      encoded_payload="$(printf '%s' $decode.output | base64 -w0)"
      mkdir -p "$ARTIFACTS_DIR/router-dispatch-logs"
      dispatch_log="$ARTIFACTS_DIR/router-dispatch-logs/epic-decompose.log"
      nohup archon workflow run epic-decompose \
        --cwd "$target_cwd" \
        --branch "epic-decompose-$WORKFLOW_ID" \
        "$encoded_payload" \
        >"$dispatch_log" 2>&1 < /dev/null &
      printf '{"dispatched":"true","workflow":"epic-decompose","log":"%s","pid":"%s"}' "$dispatch_log" "$!"

  - id: route-task-tests
    depends_on: [ decode ]
    timeout: 900000
    when: "$decode.output.event == 'created' && $decode.output.issue_type == 'Task'
      && $decode.output.status == 'Backlog'"
    bash: |
      set -euo pipefail
      target_cwd=$decode.output.codebase_cwd
      if [ -z "$target_cwd" ] || [ "$target_cwd" = "null" ]; then
        target_cwd="$PWD"
      fi
      encoded_payload="$(printf '%s' $decode.output | base64 -w0)"
      mkdir -p "$ARTIFACTS_DIR/router-dispatch-logs"
      dispatch_log="$ARTIFACTS_DIR/router-dispatch-logs/task-tests-placeholder.log"
      nohup archon workflow run task-tests-placeholder \
        --cwd "$target_cwd" \
        --branch "task-tests-$WORKFLOW_ID" \
        "$encoded_payload" \
        >"$dispatch_log" 2>&1 < /dev/null &
      printf '{"dispatched":"true","workflow":"task-tests-placeholder","log":"%s","pid":"%s"}' "$dispatch_log" "$!"

  - id: route-task-implement
    depends_on: [ decode ]
    timeout: 900000
    when: "$decode.output.event == 'transition' && $decode.output.issue_type ==
      'Task' && $decode.output.to_status == 'In Progress'"
    bash: |
      set -euo pipefail
      target_cwd=$decode.output.codebase_cwd
      if [ -z "$target_cwd" ] || [ "$target_cwd" = "null" ]; then
        target_cwd="$PWD"
      fi
      encoded_payload="$(printf '%s' $decode.output | base64 -w0)"
      mkdir -p "$ARTIFACTS_DIR/router-dispatch-logs"
      dispatch_log="$ARTIFACTS_DIR/router-dispatch-logs/task-implement-placeholder.log"
      nohup archon workflow run task-implement-placeholder \
        --cwd "$target_cwd" \
        --branch "task-implement-$WORKFLOW_ID" \
        "$encoded_payload" \
        >"$dispatch_log" 2>&1 < /dev/null &
      printf '{"dispatched":"true","workflow":"task-implement-placeholder","log":"%s","pid":"%s"}' "$dispatch_log" "$!"
