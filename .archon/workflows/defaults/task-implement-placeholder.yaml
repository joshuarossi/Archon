name: task-implement-placeholder
description: Jira placeholder workflow for Task implementation and lifecycle.

worktree:
  enabled: true

nodes:
  - id: decode
    bash: |
      set -euo pipefail
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing JSON payload input");
        }
        let obj;
        try {
          const decoded = Buffer.from(raw, "base64").toString("utf8");
          obj = JSON.parse(decoded);
        } catch {
          obj = JSON.parse(raw);
        }
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"

  - id: task-implement-placeholder
    depends_on: [ decode ]
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      You are the Jira implementation placeholder handler.
      Use Atlassian MCP tools explicitly.

      Preferred tool names (use these exact names when available):
      - Atlassian:fetch
      - Atlassian:addCommentToJiraIssue
      - Atlassian:addWorklogToJiraIssue

      If comment tool names differ in this MCP server, first inspect available
      Atlassian:* tools and then use the equivalent Jira comment/update tool.

      Trigger payload:
      $decode.output

      Add a Jira comment on Task `$decode.output.issue_key` with this exact message:
      "Placeholder: implementing this task now."
      Then verify that the comment is visible on the task and include a second short
      comment confirming verification result.

  - id: task-test-gate-placeholder
    depends_on: [ task-implement-placeholder ]
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/test-results"
      attempt_file="$ARTIFACTS_DIR/test-results/attempt.txt"
      report_file="$ARTIFACTS_DIR/test-results/latest.txt"
      attempt=0
      if [ -f "$attempt_file" ]; then
        attempt="$(cat "$attempt_file")"
      fi
      attempt=$((attempt + 1))
      printf "%s" "$attempt" > "$attempt_file"

      if [ "$attempt" -eq 1 ]; then
        cat > "$report_file" <<'EOF'
      SIMULATED TEST RESULT: FAIL
      - placeholder-test-1 failed
      - placeholder-test-2 failed
      EOF
        printf '{"pass":"false","attempt":"%s","report_path":"%s"}' "$attempt" "$report_file"
      else
        cat > "$report_file" <<'EOF'
      SIMULATED TEST RESULT: PASS
      - all placeholder tests passed
      EOF
        printf '{"pass":"true","attempt":"%s","report_path":"%s"}' "$attempt" "$report_file"
      fi

  - id: task-test-gate-comment-placeholder
    depends_on: [ task-test-gate-placeholder ]
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      Add a Jira comment on Task `$decode.output.issue_key` with this exact text:
      "Placeholder: deterministic test gate attempt $task-test-gate-placeholder.output.attempt result pass=$task-test-gate-placeholder.output.pass."

  - id: task-fix-retry-placeholder
    depends_on: [ task-test-gate-placeholder ]
    when: "$task-test-gate-placeholder.output.pass == 'false'"
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    allowed_tools: [ Read, Grep, Glob ]
    prompt: |
      You are the placeholder "dev fix" retry for Jira task `$decode.output.issue_key`.

      Failure report path:
      $task-test-gate-placeholder.output.report_path

      Rules:
      - Do not run tests yourself. The deterministic gate runs tests.
      - Do not edit files under tests/.
      - For this plumbing-only phase, do not edit source code either.
      - Add one Jira comment on `$decode.output.issue_key` with this exact text:
        "Placeholder: attempted fix based on failing test report."

      Keep it short and finish.

  - id: task-test-gate-retry-placeholder
    depends_on: [ task-fix-retry-placeholder, task-test-gate-comment-placeholder ]
    when: "$task-test-gate-placeholder.output.pass == 'false'"
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/test-results"
      attempt_file="$ARTIFACTS_DIR/test-results/attempt.txt"
      report_file="$ARTIFACTS_DIR/test-results/latest.txt"
      attempt=0
      if [ -f "$attempt_file" ]; then
        attempt="$(cat "$attempt_file")"
      fi
      attempt=$((attempt + 1))
      printf "%s" "$attempt" > "$attempt_file"

      if [ "$attempt" -lt 2 ]; then
        cat > "$report_file" <<'EOF'
      SIMULATED TEST RESULT: FAIL
      - placeholder retry still failing
      EOF
        printf '{"pass":"false","attempt":"%s","report_path":"%s"}' "$attempt" "$report_file"
      else
        cat > "$report_file" <<'EOF'
      SIMULATED TEST RESULT: PASS
      - all placeholder tests passed after retry
      EOF
        printf '{"pass":"true","attempt":"%s","report_path":"%s"}' "$attempt" "$report_file"
      fi

  - id: task-test-gate-retry-comment-placeholder
    depends_on: [ task-test-gate-retry-placeholder ]
    when: "$task-test-gate-placeholder.output.pass == 'false'"
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      Add a Jira comment on Task `$decode.output.issue_key` with this exact text:
      "Placeholder: deterministic test gate retry attempt $task-test-gate-retry-placeholder.output.attempt result pass=$task-test-gate-retry-placeholder.output.pass."

  - id: open-pr-placeholder
    depends_on:
      [
        task-test-gate-placeholder,
        task-test-gate-retry-placeholder,
        task-test-gate-retry-comment-placeholder,
      ]
    trigger_rule: none_failed_min_one_success
    when: "$task-test-gate-placeholder.output.pass == 'true' ||
      $task-test-gate-retry-placeholder.output.pass == 'true'"
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      You are the PR-open placeholder for Jira task `$decode.output.issue_key`.

      Do exactly this:
      1) Add a Jira comment on `$decode.output.issue_key` with this exact text:
         "Placeholder: opened PR for this task."
      2) Add a second Jira comment with this exact text:
         "Placeholder PR URL: https://example.com/pr/$decode.output.issue_key"

  - id: pr-review-placeholder
    depends_on: [ open-pr-placeholder ]
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/review"
      attempt_file="$ARTIFACTS_DIR/review/attempt.txt"
      attempt=0
      if [ -f "$attempt_file" ]; then
        attempt="$(cat "$attempt_file")"
      fi
      attempt=$((attempt + 1))
      printf "%s" "$attempt" > "$attempt_file"

      if [ "$attempt" -eq 1 ]; then
        printf '{"decision":"changes_requested","attempt":"%s"}' "$attempt"
      else
        printf '{"decision":"approved","attempt":"%s"}' "$attempt"
      fi

  - id: pr-review-comment-placeholder
    depends_on: [ pr-review-placeholder ]
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      Add a Jira comment on Task `$decode.output.issue_key` with this exact text:
      "Placeholder: PR review decision=$pr-review-placeholder.output.decision attempt=$pr-review-placeholder.output.attempt."

  - id: pr-synthesis-placeholder
    depends_on: [ pr-review-placeholder ]
    bash: |
      set -euo pipefail
      # Placeholder fan-in node: today this passes through one reviewer decision.
      # Later this will aggregate multiple reviewer outputs.
      decision="$pr-review-placeholder.output.decision"
      if [ -z "$decision" ] || [ "$decision" = "null" ]; then
        decision="changes_requested"
      fi
      printf '{"decision":"%s","reviewer_count":"1"}' "$decision"

  - id: pr-synthesis-comment-placeholder
    depends_on: [ pr-synthesis-placeholder ]
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      Add a Jira comment on Task `$decode.output.issue_key` with this exact text:
      "Placeholder: synthesis decision=$pr-synthesis-placeholder.output.decision reviewers=$pr-synthesis-placeholder.output.reviewer_count."

  - id: pr-rework-placeholder
    depends_on:
      [
        pr-review-placeholder,
        pr-review-comment-placeholder,
        pr-synthesis-comment-placeholder,
      ]
    when: "$pr-review-placeholder.output.decision == 'changes_requested'"
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    allowed_tools: [ Read, Grep, Glob ]
    prompt: |
      You are the placeholder PR rework retry for `$decode.output.issue_key`.
      Synthesis requested changes.

      Do exactly this:
      1) Add a Jira comment with this exact text:
         "Placeholder: addressed PR review concerns."
      2) Stop after the update.

  - id: pr-review-retry-placeholder
    depends_on: [ pr-rework-placeholder ]
    when: "$pr-review-placeholder.output.decision == 'changes_requested'"
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/review"
      attempt_file="$ARTIFACTS_DIR/review/attempt.txt"
      attempt=0
      if [ -f "$attempt_file" ]; then
        attempt="$(cat "$attempt_file")"
      fi
      attempt=$((attempt + 1))
      printf "%s" "$attempt" > "$attempt_file"
      if [ "$attempt" -lt 2 ]; then
        printf '{"decision":"changes_requested","attempt":"%s"}' "$attempt"
      else
        printf '{"decision":"approved","attempt":"%s"}' "$attempt"
      fi

  - id: pr-review-retry-comment-placeholder
    depends_on: [ pr-review-retry-placeholder ]
    when: "$pr-review-placeholder.output.decision == 'changes_requested'"
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      Add a Jira comment on Task `$decode.output.issue_key` with this exact text:
      "Placeholder: PR review retry decision=$pr-review-retry-placeholder.output.decision attempt=$pr-review-retry-placeholder.output.attempt."

  - id: pr-approved
    depends_on: [ pr-review-placeholder, pr-review-retry-placeholder ]
    trigger_rule: none_failed_min_one_success
    bash: |
      set -euo pipefail
      attempt_file="$ARTIFACTS_DIR/review/attempt.txt"
      attempt="0"
      if [ -f "$attempt_file" ]; then
        attempt="$(cat "$attempt_file")"
      fi
      # Deterministic review loop: first review asks for changes, retry approves.
      if [ "$attempt" -ge 2 ]; then
        approved="true"
      else
        approved="false"
      fi
      printf '{"approved":"%s"}' "$approved"

  - id: pr-approved-comment
    depends_on: [ pr-approved, pr-review-retry-comment-placeholder ]
    trigger_rule: none_failed_min_one_success
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      Add a Jira comment on Task `$decode.output.issue_key` with this exact text:
      "Placeholder: PR approval gate approved=$pr-approved.output.approved."

  - id: merge-pr-placeholder
    depends_on: [ pr-approved, pr-approved-comment ]
    when: "$pr-approved.output.approved == 'true'"
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      You are the merge placeholder for Jira task `$decode.output.issue_key`.
      Add a Jira comment with this exact text:
      "Placeholder: PR merged for this task."

  - id: task-done-placeholder
    depends_on: [ merge-pr-placeholder ]
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      You are the finalization placeholder for Jira task `$decode.output.issue_key`.
      Use Atlassian MCP tools explicitly.

      Preferred tool names:
      - Atlassian:transitionJiraIssue
      - Atlassian:addCommentToJiraIssue

      Do exactly these steps:
      1) Transition `$decode.output.issue_key` to "Done".
      2) Add a Jira comment with this exact text:
         "Placeholder: task moved to Done after merge."
      3) Verify the status is Done and add a short verification comment.
