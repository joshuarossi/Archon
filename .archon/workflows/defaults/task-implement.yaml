name: task-implement
description: Implement a Jira task — write code that satisfies the acceptance criteria. After each iteration, deterministic validation runs; on green, generate docs and open a PR.

worktree:
  enabled: true

nodes:
  - id: decode
    bash: |
      # Decode the base64 webhook payload; capture workflow start time for end-of-run worklog.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      date +%s%3N > "$ARTIFACTS_DIR/.workflow-start-ms"
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing JSON payload input");
        }
        let obj;
        try {
          const decoded = Buffer.from(raw, "base64").toString("utf8");
          obj = JSON.parse(decoded);
        } catch {
          obj = JSON.parse(raw);
        }
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"

  - id: write-trigger-artifact
    depends_on: [ decode ]
    bash: |
      # Persist the decoded webhook payload as $ARTIFACTS_DIR/trigger-payload.json.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      out="$ARTIFACTS_DIR/trigger-payload.json"
      printf '%s' $decode.output | bun -e '
        import { writeFileSync, readFileSync } from "node:fs";
        const obj = JSON.parse(readFileSync(0, "utf8"));
        writeFileSync(process.argv[1], JSON.stringify(obj, null, 2));
      ' -- "$out"
      printf '\n{"trigger_payload":"%s"}' "$out"

  - id: fetch-task-context
    depends_on: [ write-trigger-artifact ]
    bash: |
      # Fetch the task from Jira and write task-context.md, parent-epic-key.txt, task.raw.json.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-fetch-task-context.ts

  - id: fetch-epic-tech-context
    depends_on: [ fetch-task-context ]
    bash: |
      # Fetch parent Epic's attachments (TechSpec, DesignDoc, etc.) so the dev agent has full context.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      parent_key="$(cat "$ARTIFACTS_DIR/parent-epic-key.txt" 2>/dev/null || echo "")"
      if [ -z "$parent_key" ]; then
        echo "No parent Epic key — skipping tech context fetch."
        printf '\n{"skipped":"true"}'
        exit 0
      fi
      echo "Fetching parent Epic $parent_key..."
      mkdir -p "$ARTIFACTS_DIR/parent-epic"
      # NOTE: $decode.output.project is bare (no surrounding "..."): the
      # Archon engine wraps string outputs in single quotes for shell
      # safety. Wrapping in double quotes would preserve the inner
      # single quotes literally, producing 'WOR' instead of WOR in the
      # resulting JSON.
      printf '{"event":"transition","issue_key":"%s","project":"%s"}\n' \
        "$parent_key" $decode.output.project > "$ARTIFACTS_DIR/parent-epic/trigger-payload.json"
      ARTIFACTS_DIR="$ARTIFACTS_DIR/parent-epic" bun /home/user/Archon/.archon/scripts/jira-fetch-epic.ts > /dev/null
      ARTIFACTS_DIR="$ARTIFACTS_DIR/parent-epic" bun /home/user/Archon/.archon/scripts/jira-fetch-attachments.ts > /dev/null
      cp "$ARTIFACTS_DIR/parent-epic/epic-context.md" "$ARTIFACTS_DIR/parent-epic-context.md"
      cp "$ARTIFACTS_DIR/parent-epic/attachments.md" "$ARTIFACTS_DIR/parent-attachments.md"
      printf '\n{"parent_context":"%s","parent_attachments":"%s"}' \
        "$ARTIFACTS_DIR/parent-epic-context.md" "$ARTIFACTS_DIR/parent-attachments.md"

  # ─── Rebase the branch onto current origin/main BEFORE the dev runs ──
  # The test-gen workflow already pushed tests to this branch off whatever
  # main was when it ran. Sibling tickets may have merged in the meantime;
  # if we don't rebase first, validate-1 fails on tests/lint/typecheck
  # against THOSE sibling tickets' files (stale-base illusion), the chain
  # cascades to skips, and we never reach the open-pr node. Rebasing first
  # also means the dev agent sees the actual current state of the codebase
  # rather than a snapshot from minutes/hours ago.
  - id: preflight-clean-worktree
    depends_on: [ fetch-epic-tech-context ]
    bash: |
      # Rebase must run on a clean branch. Retries/resumes can leave local
      # modifications from a previously aborted dev attempt in the same ticket
      # worktree. Normalize the checkout deterministically before rebase.
      set -euo pipefail
      changed="$(git status --porcelain || true)"
      if [ -n "$changed" ]; then
        echo "Pre-rebase sanitation: worktree dirty, normalizing to HEAD." >&2
        printf '%s\n' "$changed" >&2

        # Tracked files: discard staged + unstaged changes.
        git reset --hard HEAD >/dev/null

        # Untracked files: remove explicitly (never use git clean -fd).
        # This is safe in per-ticket isolated worktrees and avoids carrying
        # stale scratch files between retries.
        while IFS= read -r rel; do
          [ -n "$rel" ] || continue
          rm -rf -- "$rel"
        done < <(git ls-files --others --exclude-standard)
      fi
      printf '{"clean":"true","sanitized":"%s"}' "$( [ -n "$changed" ] && echo true || echo false )"

  - id: rebase-on-main
    depends_on: [ preflight-clean-worktree ]
    bash: |
      set -euo pipefail
      git fetch origin main --quiet
      if ! git rebase origin/main; then
        echo "Rebase onto origin/main produced conflicts. Aborting; surface to human." >&2
        git rebase --abort || true
        exit 1
      fi
      git push --force-with-lease origin HEAD --quiet
      printf '{"rebased":"true","onto":"%s"}' "$(git rev-parse origin/main | cut -c1-12)"

  - id: baseline-test
    depends_on: [ rebase-on-main ]
    bash: |
      # Run a baseline deterministic test gate before any dev attempt so feedback.json exists
      # from the first implementation pass onward.
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Dev attempt 1 + deterministic test + validation feedback ─────────
  # Test boundaries: PreToolUse hook only (paths + selective Bash). test-* nodes
  # run deterministic gates; validate-* nodes interpret those raw artifacts.
  - id: dev-attempt-1
    depends_on: [ baseline-test ]
    context: fresh
    # Same absolute path convention as bash nodes in this workflow (Archon checkout).
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    command: archon-dev-attempt
  - id: test-1
    depends_on: [ dev-attempt-1 ]
    bash: |
      # Deterministic quality gate: lint, typecheck, scoped vitest, scoped playwright.
      # Always exits 0 and writes raw test artifacts. The validate node decides
      # what feedback the next implementation attempt should receive.
      # The script reads ISSUE_KEY from $ARTIFACTS_DIR/trigger-payload.json
      # and auto-detects the attempt number from existing feedback artifacts.
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: validate-1
    depends_on: [ test-1 ]
    context: fresh
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        instructions_file: { type: string }
        raw_report: { type: string }
        summary: { type: string }
      required: [ passed, instructions_file, raw_report, summary ]
    command: archon-validate-deterministic

  - id: review-dev-attempt-1
    depends_on: [ validate-1 ]
    context: fresh
    command: archon-review-dev-attempt

  - id: parse-dev-review-1
    depends_on: [ review-dev-attempt-1 ]
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-latest.json"}'
        exit 0
      fi
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  # ─── Dev attempt 2 + deterministic test + validation feedback ─────────
  # Same PreToolUse hook as dev-attempt-1. Reads feedback.json from validate-1.
  - id: dev-attempt-2
    depends_on: [ validate-1, parse-dev-review-1 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    command: archon-dev-attempt
  - id: test-2
    depends_on: [ dev-attempt-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: validate-2
    depends_on: [ test-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    context: fresh
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        instructions_file: { type: string }
        raw_report: { type: string }
        summary: { type: string }
      required: [ passed, instructions_file, raw_report, summary ]
    command: archon-validate-deterministic

  - id: review-dev-attempt-2
    depends_on: [ validate-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    context: fresh
    command: archon-review-dev-attempt

  - id: parse-dev-review-2
    depends_on: [ review-dev-attempt-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-latest.json"}'
        exit 0
      fi
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  # ─── Explicit repair attempts after the first two gated attempts ──
  # The old loop node hid each retry behind one opaque DAG node and stripped
  # AI safety fields from the loop body. Keep the same retry intent, but make
  # each deterministic test result feed an explicit AI validate node, then a
  # guarded fix node that consumes the validator's instructions.md alongside
  # raw feedback.json. Every fix node is production-code-only and runs after
  # the previous test + validation stage has written instructions.md.
  - id: fix-after-validate-2
    depends_on: [ validate-2, parse-dev-review-2 ]
    when: "$validate-2.output.passed == 'false' || $parse-dev-review-2.output.passed == 'false'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    command: archon-fix-after-validate
  - id: test-3
    depends_on: [ fix-after-validate-2 ]
    when: "$validate-2.output.passed == 'false' || $parse-dev-review-2.output.passed == 'false'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: validate-3
    depends_on: [ test-3 ]
    when: "$validate-2.output.passed == 'false' || $parse-dev-review-2.output.passed == 'false'"
    context: fresh
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        instructions_file: { type: string }
        raw_report: { type: string }
        summary: { type: string }
      required: [ passed, instructions_file, raw_report, summary ]
    command: archon-validate-deterministic

  - id: review-dev-attempt-3
    depends_on: [ validate-3 ]
    when: "$validate-2.output.passed == 'false' || $parse-dev-review-2.output.passed == 'false'"
    context: fresh
    command: archon-review-dev-attempt
  - id: parse-dev-review-3
    depends_on: [ review-dev-attempt-3 ]
    when: "$validate-2.output.passed == 'false' || $parse-dev-review-2.output.passed == 'false'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-latest.json"}'
        exit 0
      fi
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  - id: fix-after-validate-3
    depends_on: [ validate-3, parse-dev-review-3 ]
    when: "$validate-3.output.passed == 'false' || $parse-dev-review-3.output.passed == 'false'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    command: archon-fix-after-validate
  - id: test-4
    depends_on: [ fix-after-validate-3 ]
    when: "$validate-3.output.passed == 'false' || $parse-dev-review-3.output.passed == 'false'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: validate-4
    depends_on: [ test-4 ]
    when: "$validate-3.output.passed == 'false' || $parse-dev-review-3.output.passed == 'false'"
    context: fresh
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        instructions_file: { type: string }
        raw_report: { type: string }
        summary: { type: string }
      required: [ passed, instructions_file, raw_report, summary ]
    command: archon-validate-deterministic

  - id: review-dev-attempt-4
    depends_on: [ validate-4 ]
    when: "$validate-3.output.passed == 'false' || $parse-dev-review-3.output.passed == 'false'"
    context: fresh
    command: archon-review-dev-attempt
  - id: parse-dev-review-4
    depends_on: [ review-dev-attempt-4 ]
    when: "$validate-3.output.passed == 'false' || $parse-dev-review-3.output.passed == 'false'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-latest.json"}'
        exit 0
      fi
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  - id: fix-after-validate-4
    depends_on: [ validate-4, parse-dev-review-4 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    command: archon-fix-after-validate
  - id: test-5
    depends_on: [ fix-after-validate-4 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: validate-5
    depends_on: [ test-5 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    context: fresh
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        instructions_file: { type: string }
        raw_report: { type: string }
        summary: { type: string }
      required: [ passed, instructions_file, raw_report, summary ]
    command: archon-validate-deterministic

  - id: review-dev-attempt-5
    depends_on: [ validate-5 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    context: fresh
    command: archon-review-dev-attempt
  - id: parse-dev-review-5
    depends_on: [ review-dev-attempt-5 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-latest.json"}'
        exit 0
      fi
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  - id: implementation-quality-final
    depends_on: [ parse-dev-review-1, parse-dev-review-2, parse-dev-review-3, parse-dev-review-4, parse-dev-review-5 ]
    trigger_rule: all_done
    bash: |
      # The review prompt always overwrites dev-review-latest.json. Snapshot
      # it as dev-review-final.json for downstream nodes (open-pr, test-repair,
      # etc.) that want a stable filename for "the final verdict at the end
      # of the dev-loop."
      set -euo pipefail
      final="$ARTIFACTS_DIR/dev-review-final.json"
      latest="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ -f "$latest" ]; then
        cp "$latest" "$final"
      else
        printf '{"passed":false,"reason":"missing implementation review artifact","required_repairs":[]}\n' > "$final"
      fi
      # Classify failure_scope from required_repairs[].file paths so we can
      # decide whether to route to a test-repair node before failing.
      #   "production" — no required_repairs touch test paths
      #   "tests"      — every required_repair touches test paths
      #   "mixed"      — some test, some production
      #   "none"       — review passed OR no required_repairs at all
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        const repairs = Array.isArray(review.required_repairs) ? review.required_repairs : [];
        const TEST_PATH_RE =
          /(^|\/)(tests?|e2e|__tests__)(\/|$)|\.(test|spec)\.(ts|tsx|js|jsx|mjs|cjs|py|go|rs)$|(^|\/)(vitest|playwright|jest|cypress)\.config\./;
        const isTestPath = (p) => typeof p === "string" && TEST_PATH_RE.test(p);
        let scope = "none";
        if (review.passed !== true && repairs.length > 0) {
          const testCount = repairs.filter((r) => isTestPath(r?.file)).length;
          if (testCount === repairs.length) scope = "tests";
          else if (testCount === 0) scope = "production";
          else scope = "mixed";
        } else if (review.passed !== true) {
          // Reviewer said failed but listed no specific repairs — treat as
          // production scope so we do not route to test-repair on a vague
          // verdict.
          scope = "production";
        }
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: repairs.length,
          failure_scope: scope
        }));
      ' -- "$final"

  # ---------------------------------------------------------------------------
  # Test-side salvage path
  #
  # When the dev-loop converged on production code that fully satisfies the
  # ACs but the final reviewer flagged test-file defects only (e.g. wrong
  # selector regex, stale import, type-cast missing intermediate `unknown`),
  # bring the test-gen agent back to apply the reviewer's required repairs.
  # The dev agent cannot do this because its cage forbids editing tests
  # (correctly — coordination drift between test-author and code-author is
  # exactly the failure class the contract feature was built to prevent).
  # The test-repair agent gets the inverse cage: it may read anything but
  # write only to test paths.
  # ---------------------------------------------------------------------------

  - id: repair-tests-from-final-review
    depends_on: [ implementation-quality-final ]
    when: "$implementation-quality-final.output.failure_scope == 'tests'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-tests-only.ts
          timeout: 30
    command: archon-repair-tests-from-final-review

  - id: validate-after-test-repair
    depends_on: [ repair-tests-from-final-review ]
    when: "$implementation-quality-final.output.failure_scope == 'tests'"
    bash: |
      # Re-run the same validation gate test-1..test-5 used. Reuses the
      # bundled validation script so behavior matches earlier attempts.
      # Always exits 0; the next node parses the report.
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh
      # The script writes its raw report to $ARTIFACTS_DIR/test-after-repair.json
      # via the same path it uses for the standard test-N nodes. We pin it
      # here to a stable name so implementation-ready can read it.
      latest_report="$ARTIFACTS_DIR/feedback.json"
      cp "$latest_report" "$ARTIFACTS_DIR/feedback.after-test-repair.json"
      bun -e '
        import { readFileSync } from "node:fs";
        const r = JSON.parse(readFileSync(process.argv[1], "utf8"));
        const passed = r.overall === "passed" || (Array.isArray(r.gates)
          ? r.gates.filter((g) => g.blocking).every((g) => g.status === "passed")
          : false);
        process.stdout.write(JSON.stringify({ passed, report: process.argv[1] }));
      ' -- "$ARTIFACTS_DIR/feedback.after-test-repair.json"
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        report: { type: string }
      required: [ passed, report ]

  - id: implementation-ready
    depends_on: [ validate-1, validate-2, validate-3, validate-4, validate-5, implementation-quality-final, validate-after-test-repair ]
    trigger_rule: all_done
    bash: |
      # Substitution rules in this script:
      #
      # 1. `$node.output.field` is replaced by the Archon engine before
      #    bash sees the script. STRING values are wrapped in single
      #    quotes for shell safety (see shellQuote in dag-executor.ts);
      #    booleans and numbers are emitted bare. Therefore
      #    $node.output.field MUST appear bare in this script (no
      #    surrounding `"..."`); otherwise the outer double quotes
      #    preserve the engine's single quotes inside the string and
      #    bash assigns the literal `'tests'` rather than `tests`,
      #    causing every later [ "$x" = "y" ] check to silently
      #    mismatch. This was the root cause of WOR-87 stalling after
      #    the test-side salvage path ran successfully but
      #    failure_scope compared as `'tests'` ≠ `tests`.
      #
      # 2. -u is dropped from `set -euo pipefail`. When the dev-loop
      #    converges early (attempt 1, 2, or 3), validate-4/validate-5
      #    are skipped DAG nodes whose substitutions resolve to empty.
      #    With -u, bash treats them as unset and exits before any
      #    output. Without -u, missing substitutions become empty
      #    strings, which the [ "" = "true" ] comparisons handle
      #    correctly.
      set -eo pipefail
      validation_passed=false
      if [ $validate-1.output.passed = true ] || [ $validate-2.output.passed = true ] || [ $validate-3.output.passed = true ] || [ $validate-4.output.passed = true ] || [ $validate-5.output.passed = true ]; then
        validation_passed=true
      fi
      quality_passed=$implementation-quality-final.output.passed
      failure_scope=$implementation-quality-final.output.failure_scope
      # Test-side salvage: if reviewer flagged test-only failures and the
      # post-repair validation is green, treat the implementation as ready.
      # The production code already passed reviewer-quality gates; only
      # the tests were blocking, and they are now repaired.
      test_repair_passed=$validate-after-test-repair.output.passed
      if [ "$validation_passed" = true ] && [ "$quality_passed" = true ]; then
        ready=true
      elif [ "$failure_scope" = tests ] && [ "$test_repair_passed" = true ]; then
        ready=true
      else
        ready=false
      fi
      printf '{"ready":%s,"validation_passed":%s,"implementation_review_passed":%s,"failure_scope":"%s","test_repair_passed":%s,"review":"%s"}\n' \
        "${ready:-false}" "${validation_passed:-false}" "${quality_passed:-false}" "${failure_scope:-none}" "${test_repair_passed:-false}" "$ARTIFACTS_DIR/dev-review-final.json"

  - id: fail-implementation-not-ready
    depends_on: [ implementation-ready ]
    when: "$implementation-ready.output.ready == 'false'"
    bash: |
      set -euo pipefail
      echo "Implementation did not satisfy validation and review gates." >&2
      echo "See $ARTIFACTS_DIR/feedback.json, $ARTIFACTS_DIR/instructions.md, and $ARTIFACTS_DIR/dev-review-final.json for the final failed state." >&2
      exit 1

  - id: generate-docs
    depends_on: [ implementation-ready ]
    when: "$implementation-ready.output.ready == 'true'"
    context: fresh
    command: archon-generate-docs

  - id: open-pr
    depends_on: [ generate-docs ]
    bash: |
      # Push the branch and open a GitHub PR. Posts the PR URL as a Jira comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-open-pr.ts

  - id: verify-pr-ready
    depends_on: [ open-pr ]
    trigger_rule: all_done
    bash: |
      # Guard downstream review/synthesis/merge chain. If open-pr never ran,
      # stop the rest of the DAG from fabricating review output.
      set -euo pipefail
      if [ ! -f "$ARTIFACTS_DIR/pr-info.json" ]; then
        printf '{"ready":"false","reason":"missing_pr_info"}'
        exit 0
      fi
      pr_number="$(jq -r '.pr_number // ""' "$ARTIFACTS_DIR/pr-info.json" 2>/dev/null || echo "")"
      if [ -z "$pr_number" ]; then
        printf '{"ready":"false","reason":"missing_pr_number"}'
        exit 0
      fi
      printf '{"ready":"true","pr_number":"%s"}' "$pr_number"

  # ─── Review setup: write the artifacts the existing reviewer commands expect ──
  # archon-code-review-agent etc. read $ARTIFACTS_DIR/.pr-number and
  # $ARTIFACTS_DIR/review/scope.md. We have pr-info.json + task-context.md;
  # this bridge converts.
  #
  # Note: rebase-on-main now runs BEFORE dev-attempt-1, not here. The branch
  # is already on current main by the time reviewers see it.
  - id: setup-review-context
    depends_on: [ verify-pr-ready ]
    when: "$verify-pr-ready.output.ready == 'true'"
    bash: |
      set -euo pipefail
      # Refresh origin/main so the diff below compares against the actual
      # current main, not whatever stale ref this worktree last fetched.
      # Without this, sibling tickets that merged while this one was in
      # flight show up as "deleted by this PR" — leading reviewers and the
      # synthesizer to fabricate phantom regressions.
      git fetch origin main --quiet || true
      mkdir -p "$ARTIFACTS_DIR/review"
      jq -r .pr_number "$ARTIFACTS_DIR/pr-info.json" > "$ARTIFACTS_DIR/.pr-number"
      cat > "$ARTIFACTS_DIR/review/scope.md" <<EOF
      # Review Scope

      **Ticket**: $decode.output.issue_key
      **PR**: #$(cat "$ARTIFACTS_DIR/.pr-number")
      **Branch**: $(git rev-parse --abbrev-ref HEAD)
      **Compared against main SHA**: $(git rev-parse --short origin/main)

      ## Changed Files

      $(git diff origin/main --name-only | sed 's/^/- /')

      ## Task Context

      $(cat "$ARTIFACTS_DIR/task-context.md")
      EOF
      printf '\n{"pr_number":"%s","scope_path":"%s"}' \
        "$(cat "$ARTIFACTS_DIR/.pr-number")" \
        "$ARTIFACTS_DIR/review/scope.md"

  # ─── Reviewers fan out in parallel ───────────────────────────────────
  # Four use the existing Archon reviewer commands; one (scope) is custom
  # because the existing archon-pr-review-scope depends on artifacts from
  # the plan-to-pr chain that we don't produce.

  - id: review-scope
    depends_on: [ setup-review-context ]
    context: fresh
    output_format:
      type: object
      properties:
        verdict: { type: string, enum: [APPROVE, REQUEST_CHANGES, NEEDS_DISCUSSION] }
        critical_count: { type: integer }
        high_count: { type: integer }
        medium_count: { type: integer }
        low_count: { type: integer }
      required: [verdict, critical_count, high_count, medium_count, low_count]
    command: archon-review-scope

  - id: review-code
    command: archon-code-review-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-error-handling
    command: archon-error-handling-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-docs
    command: archon-docs-impact-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-comment-quality
    command: archon-comment-quality-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: verify-reviewer-artifacts
    depends_on: [ review-scope, review-code, review-error-handling, review-docs, review-comment-quality ]
    trigger_rule: all_done
    when: "$verify-pr-ready.output.ready == 'true'"
    bash: |
      # Synthesize must not run unless at least one reviewer artifact exists.
      set -euo pipefail
      review_dir="$ARTIFACTS_DIR/review"
      mkdir -p "$review_dir"
      shopt -s nullglob
      files=("$review_dir/"*-findings.md)
      shopt -u nullglob
      count="${#files[@]}"
      if [ "${count:-0}" -lt 1 ]; then
        printf '{"has_findings":"false","count":0}'
        exit 0
      fi
      printf '{"has_findings":"true","count":%s}' "$count"

  # ─── Synthesize the five reviewers' artifacts into a consolidated review ──
  # Uses the existing Archon synthesizer command; reads all *-findings.md
  # files, decides APPROVE/REQUEST_CHANGES based on severity thresholds,
  # posts a master review comment to the PR.
  #
  # trigger_rule: all_done — synthesize must read ALL five reviewers'
  # artifacts, so it waits for every reviewer to settle. We use all_done
  # rather than all_success / none_failed_min_one_success because a
  # crashed individual reviewer shouldn't block the chain — the synth
  # command handles missing findings files internally and produces a
  # partial review from whatever DID land. The earlier `one_success`
  # would have let synthesize fire while some reviewers were still
  # running — only safe by accident because all five tend to complete
  # within seconds of each other.
  - id: synthesize
    command: archon-synthesize-review
    depends_on: [ verify-reviewer-artifacts ]
    when: "$verify-reviewer-artifacts.output.has_findings == 'true'"
    context: fresh

  # ─── Parse the synthesizer's verdict into a JSON decision field ──
  # The bundled archon-synthesize-review command emits prose narration on
  # stdout and writes consolidated-review.md to disk — it does NOT emit a
  # JSON `decision` field, so $synthesize.output.decision resolves to ''
  # and downstream `when:` gates would always evaluate false.
  # This bridge node reads the markdown verdict and re-emits it as JSON
  # ({"decision":"approve"|"changes_requested"|"needs_discussion"}) on
  # stdout so the implement-fixes / merge-pr gates can route correctly.
  - id: parse-synthesis
    depends_on: [ synthesize ]
    bash: |
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-parse-synthesis.ts

  # ─── Implement fixes if synthesizer requested changes ──
  # Existing Archon command; reads consolidated-review.md + per-reviewer
  # findings; makes the changes; commits.
  # Same PreToolUse hook as dev nodes (test paths + selective Bash).
  - id: implement-fixes
    # Our own fix-implementer (.archon/commands/defaults/task-implement-fixes.md — bundled), not
    # the bundled archon-implement-review-fixes. The bundled command is built
    # for human-in-the-loop workflows: it fixes only CRITICAL/HIGH and treats
    # MEDIUM/LOW as "for the user to decide." Our pipeline is autonomous, so
    # we want every actual issue (any severity) fixed in the same step,
    # leaving only literal questions ("do you want X or Y?") for humans.
    command: task-implement-fixes
    depends_on: [ parse-synthesis ]
    when: "$verify-pr-ready.output.ready == 'true' && $parse-synthesis.output.decision == 'changes_requested'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30

  # ─── Deterministic quality gate after fixes ──
  # Re-runs lint/typecheck/vitest/playwright. Always exits 0; the JSON output's
  # `passed` field drives the merge gate's `when:` clause below.
  # Only runs when implement-fixes ran (which itself only runs when synthesizer
  # requested changes).
  - id: post-fix-validation
    depends_on: [ implement-fixes ]
    when: "$verify-pr-ready.output.ready == 'true' && $parse-synthesis.output.decision == 'changes_requested'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Merge gate ──
  # Two paths to merge:
  #   1) Synthesizer approved on first read → no fixes needed, no post-validation needed.
  #      synthesize: succeeded, implement-fixes: skipped, post-fix-validation: skipped.
  #   2) Synthesizer requested changes → fixes ran AND post-fix-validation succeeded.
  #      synthesize: succeeded, implement-fixes: succeeded, post-fix-validation: succeeded.
  #
  # If post-fix-validation FAILED (real test failure after fixes), merge-pr's
  # all_done + when clause keeps it from running because validation didn't
  # succeed — neither path is satisfied.
  - id: merge-pr
    depends_on: [ verify-pr-ready, parse-synthesis, implement-fixes, post-fix-validation ]
    trigger_rule: all_done
    # AND binds tighter than ||, so the gate reads as:
    #   synth approved  OR  (synth requested changes AND post-fix passed)
    # The bash itself guards against open-pr having been skipped (no
    # pr-info.json on disk) — keeping that check in the consumer rather
    # than the gate avoids duplicating `$open-pr.output.pr_number != ''`
    # in every OR branch (Archon's condition evaluator has no parentheses).
    when: "$verify-pr-ready.output.ready == 'true' &&
      $parse-synthesis.output.decision == 'approve' ||
      $verify-pr-ready.output.ready == 'true' &&
      $parse-synthesis.output.decision == 'changes_requested' &&
      $post-fix-validation.output.passed == 'true'"
    bash: |
      # Squash-merge the PR, delete the branch, post Jira confirmation.
      set -euo pipefail
      if [ ! -f "$ARTIFACTS_DIR/pr-info.json" ]; then
        echo "No pr-info.json on disk — open-pr did not run, nothing to merge." >&2
        printf '{"merged":"false","reason":"no_pr"}'
        exit 0
      fi
      bun /home/user/Archon/.archon/scripts/task-merge-pr.ts

  - id: transition-to-done
    depends_on: [ merge-pr ]
    bash: |
      # Transition Jira ticket to Done with a final summary comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-transition-to-done.ts

  # ─── Human-review halt path ──
  # Synthesizer ruled NEEDS_DISCUSSION AND no findings are auto-fixable
  # (decision='needs_human_review' from parse-synthesis). Apply the
  # archon-needs-review label, post a structured Jira comment with the
  # discussion items, leave PR open and ticket In Progress. The
  # operator decides: merge manually, re-trigger after guidance, or
  # close and reset. This is the third terminal branch alongside
  # merge-pr (the merge path) and the implicit "validate-failed →
  # nothing runs" path.
  - id: flag-for-human-review
    depends_on: [ parse-synthesis, verify-pr-ready ]
    when: "$parse-synthesis.output.decision == 'needs_human_review'"
    bash: |
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export WORKFLOW_NAME="task-implement"
      bun /home/user/Archon/.archon/scripts/task-flag-needs-human-review.ts

  # Worklog runs on either terminal branch — transition-to-done (merge
  # path) OR flag-for-human-review (halt path). all_done so the worklog
  # records elapsed time even when the run halts for human attention.
  # When neither runs (validation never reached a verdict, or some
  # upstream node hard-failed), this also skips and the worklog is
  # omitted — which is the right behavior for a broken run.
  - id: log-elapsed-on-task
    depends_on: [ transition-to-done, flag-for-human-review ]
    trigger_rule: all_done
    bash: |
      # Worklog the total task-implement elapsed time on the Jira ticket.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export WORKFLOW_NAME="task-implement"
      bun /home/user/Archon/.archon/scripts/jira-log-elapsed.ts
