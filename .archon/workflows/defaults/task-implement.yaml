name: task-implement
description: Implement a Jira task — write code that satisfies the acceptance criteria. After each iteration, deterministic validation runs; on green, generate docs and open a PR.

worktree:
  enabled: true

nodes:
  - id: decode
    bash: |
      # Decode the base64 webhook payload; capture workflow start time for end-of-run worklog.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      date +%s%3N > "$ARTIFACTS_DIR/.workflow-start-ms"
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing JSON payload input");
        }
        let obj;
        try {
          const decoded = Buffer.from(raw, "base64").toString("utf8");
          obj = JSON.parse(decoded);
        } catch {
          obj = JSON.parse(raw);
        }
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"

  - id: write-trigger-artifact
    depends_on: [ decode ]
    bash: |
      # Persist the decoded webhook payload as $ARTIFACTS_DIR/trigger-payload.json.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      out="$ARTIFACTS_DIR/trigger-payload.json"
      printf '%s' $decode.output | bun -e '
        import { writeFileSync, readFileSync } from "node:fs";
        const obj = JSON.parse(readFileSync(0, "utf8"));
        writeFileSync(process.argv[1], JSON.stringify(obj, null, 2));
      ' -- "$out"
      printf '\n{"trigger_payload":"%s"}' "$out"

  - id: fetch-task-context
    depends_on: [ write-trigger-artifact ]
    bash: |
      # Fetch the task from Jira and write task-context.md, parent-epic-key.txt, task.raw.json.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-fetch-task-context.ts

  - id: fetch-epic-tech-context
    depends_on: [ fetch-task-context ]
    bash: |
      # Fetch parent Epic's attachments (TechSpec, DesignDoc, etc.) so the dev agent has full context.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      parent_key="$(cat "$ARTIFACTS_DIR/parent-epic-key.txt" 2>/dev/null || echo "")"
      if [ -z "$parent_key" ]; then
        echo "No parent Epic key — skipping tech context fetch."
        printf '\n{"skipped":"true"}'
        exit 0
      fi
      echo "Fetching parent Epic $parent_key..."
      mkdir -p "$ARTIFACTS_DIR/parent-epic"
      printf '{"event":"transition","issue_key":"%s","project":"%s"}\n' \
        "$parent_key" "$decode.output.project" > "$ARTIFACTS_DIR/parent-epic/trigger-payload.json"
      ARTIFACTS_DIR="$ARTIFACTS_DIR/parent-epic" bun /home/user/Archon/.archon/scripts/jira-fetch-epic.ts > /dev/null
      ARTIFACTS_DIR="$ARTIFACTS_DIR/parent-epic" bun /home/user/Archon/.archon/scripts/jira-fetch-attachments.ts > /dev/null
      cp "$ARTIFACTS_DIR/parent-epic/epic-context.md" "$ARTIFACTS_DIR/parent-epic-context.md"
      cp "$ARTIFACTS_DIR/parent-epic/attachments.md" "$ARTIFACTS_DIR/parent-attachments.md"
      printf '\n{"parent_context":"%s","parent_attachments":"%s"}' \
        "$ARTIFACTS_DIR/parent-epic-context.md" "$ARTIFACTS_DIR/parent-attachments.md"

  # ─── Rebase the branch onto current origin/main BEFORE the dev runs ──
  # The test-gen workflow already pushed tests to this branch off whatever
  # main was when it ran. Sibling tickets may have merged in the meantime;
  # if we don't rebase first, validate-1 fails on tests/lint/typecheck
  # against THOSE sibling tickets' files (stale-base illusion), the chain
  # cascades to skips, and we never reach the open-pr node. Rebasing first
  # also means the dev agent sees the actual current state of the codebase
  # rather than a snapshot from minutes/hours ago.
  - id: preflight-clean-worktree
    depends_on: [ fetch-epic-tech-context ]
    bash: |
      # Rebase must run on a clean branch. Retries/resumes can leave local
      # modifications from a previously aborted dev attempt in the same ticket
      # worktree. Normalize the checkout deterministically before rebase.
      set -euo pipefail
      changed="$(git status --porcelain || true)"
      if [ -n "$changed" ]; then
        echo "Pre-rebase sanitation: worktree dirty, normalizing to HEAD." >&2
        printf '%s\n' "$changed" >&2

        # Tracked files: discard staged + unstaged changes.
        git reset --hard HEAD >/dev/null

        # Untracked files: remove explicitly (never use git clean -fd).
        # This is safe in per-ticket isolated worktrees and avoids carrying
        # stale scratch files between retries.
        while IFS= read -r rel; do
          [ -n "$rel" ] || continue
          rm -rf -- "$rel"
        done < <(git ls-files --others --exclude-standard)
      fi
      printf '{"clean":"true","sanitized":"%s"}' "$( [ -n "$changed" ] && echo true || echo false )"

  - id: rebase-on-main
    depends_on: [ preflight-clean-worktree ]
    bash: |
      set -euo pipefail
      git fetch origin main --quiet
      if ! git rebase origin/main; then
        echo "Rebase onto origin/main produced conflicts. Aborting; surface to human." >&2
        git rebase --abort || true
        exit 1
      fi
      git push --force-with-lease origin HEAD --quiet
      printf '{"rebased":"true","onto":"%s"}' "$(git rev-parse origin/main | cut -c1-12)"

  - id: baseline-validate
    depends_on: [ rebase-on-main ]
    bash: |
      # Run a baseline gate before any dev attempt so feedback.json exists
      # from the first implementation pass onward.
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Dev attempt 1 + validation gate 1 ─────────────────────────────────
  # Test boundaries: PreToolUse hook only (paths + selective Bash). Validate nodes run the full gate.
  - id: dev-attempt-1
    depends_on: [ baseline-validate ]
    context: fresh
    # Same absolute path convention as bash nodes in this workflow (Archon checkout).
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    prompt: |
      # Implement Task

      **Input**: `$ARTIFACTS_DIR/task-context.md`

      ---

      ## Your Mission

      Implement the product behavior required by every acceptance criterion in
      `$ARTIFACTS_DIR/task-context.md`. The ticket context and parent
      attachments are the contract; validation feedback is only an external
      symptom report.

      Passing validation is not the direct objective. The objective is to
      implement the requested product behavior within scope. Use validation
      only to infer which requirement may still be incomplete.

      ## Phase 1: LOAD - Gather Context

      Read:
      - `$ARTIFACTS_DIR/task-context.md` — task summary, description, and
        acceptance criteria. This is the implementation spec.
      - `$ARTIFACTS_DIR/parent-attachments.md` — project tech stack,
        architecture, conventions, TechSpec, DesignDoc, STYLE_GUIDE, etc.
      - `$ARTIFACTS_DIR/feedback.json` — baseline quality gate output. Treat
        this as diagnostic signal, not as a specification.
      - Production source files needed to understand the relevant code path.

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files.

      **PHASE_1_CHECKPOINT:**
      - [ ] Acceptance criteria are listed in your notes
      - [ ] Relevant production source areas are identified
      - [ ] Validation feedback has been interpreted only as product symptoms

      ## Phase 2: PLAN - Map Requirements to Source

      Create a concise implementation plan:
      - Map each acceptance criterion to the production behavior it requires.
      - Map each required behavior to likely source files.
      - Identify any validation signal that points to an incomplete product
        behavior.
      - Ignore validation details that are test-shaped: selectors, fixture
        values, fake IDs, assertion wording, screenshots, stack trace lines,
        test file paths, and artifact paths.

      If the ticket is ambiguous, choose the most direct interpretation that
      fits the existing architecture. Do not ask for clarification.

      **PHASE_2_CHECKPOINT:**
      - [ ] Every planned edit is justified by the ticket or existing code
      - [ ] No planned edit exists solely to satisfy visible test mechanics
      - [ ] No test, fixture, generated, or validation artifact file is in scope

      ## Phase 3: IMPLEMENT - Edit Production Code

      Make only the production-code edits needed to satisfy the ticket.

      Forbidden:
      - Reading, creating, modifying, or deleting files under `tests/`, `test/`,
        `e2e/`, `__tests__/`, or matching `*.test.*` / `*.spec.*`
      - Editing test fixtures or test configs: `vitest.config.*`,
        `playwright.config.*`, `jest.config.*`
      - Running test commands: `npm test`, `npm run test*`, `vitest`,
        `playwright`, `jest`, `npx` test runners, or direct
        `node ./node_modules/.bin/...` test runners
      - Editing generated files, generated directories, or validation artifacts
        such as `test-results/`
      - Adding fake IDs, hardcoded fixture behavior, test-only branches,
        selector-driven UI, weakened auth, weakened validation, or special
        routes just because validation output exposed them
      - Using subagents or delegation tools to inspect the codebase

      **PHASE_3_CHECKPOINT:**
      - [ ] Edits are limited to production source files in ticket scope
      - [ ] No test-shaped behavior or validation-harness workaround was added
      - [ ] Existing architecture and style were followed

      ## Phase 4: VERIFY - Self-Check Without Tests

      Review your changed files manually and with non-test commands only when
      appropriate. Do not run test runners.

      Your self-check must include:
      - Requirement mapping: each acceptance criterion and the production
        behavior implemented for it
      - Validation interpretation: product-level symptoms inferred from
        feedback, without mentioning selectors, test files, line numbers,
        screenshots, fixture values, or artifact paths
      - Scope check: changed files and why each one is in ticket scope
      - Anti-gaming check: confirm no fake IDs, test selectors, hardcoded
        fixtures, generated-file edits, auth weakening, or test-specific
        branches were added

      **PHASE_4_CHECKPOINT:**
      - [ ] All acceptance criteria are implemented
      - [ ] Feedback-linked source issues for this ticket were addressed
      - [ ] No forbidden files or commands were used

      ## Phase 5: COMMIT - Save Work

      Commit the implementation on the current branch.

      The commit message should summarize the ticket behavior implemented. If
      you had to make an assumption because the ticket was ambiguous, mention
      the assumption in the commit message.

      ## Success Criteria

      - **AC_COMPLETE**: Every acceptance criterion has corresponding
        production behavior.
      - **SCOPE_DISCIPLINED**: Every changed file is justified by the ticket
        or existing architecture.
      - **NO_TEST_GAMING**: No visible validation detail was turned into a
        test-specific implementation.
      - **NO_TEST_ACCESS**: No test, fixture, config, generated, or validation
        artifact files were read or modified; no test runner was executed.
      - **COMMITTED**: The production implementation is committed.

  - id: validate-1
    depends_on: [ dev-attempt-1 ]
    bash: |
      # Deterministic quality gate: lint, typecheck, scoped vitest, scoped playwright.
      # Always exits 0; the JSON output's `passed` field drives the retry decision.
      # The script reads ISSUE_KEY from $ARTIFACTS_DIR/trigger-payload.json
      # and auto-detects the attempt number from existing feedback artifacts.
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: review-dev-attempt-1
    depends_on: [ validate-1 ]
    context: fresh
    prompt: |
      # Review Implementation Attempt

      **Input**: `$ARTIFACTS_DIR/task-context.md`

      ---

      ## Your Mission

      Review the current implementation attempt for product correctness,
      scope discipline, and anti-gaming behavior. Do not edit files. Produce a
      durable artifact for the next development attempt.

      The artifact you write is the specification for the next step. Be
      precise enough that the implementation agent can repair issues without
      reading tests or guessing your intent.

      ## Phase 1: LOAD - Gather Review Inputs

      Read:
      - `$ARTIFACTS_DIR/task-context.md`
      - `$ARTIFACTS_DIR/parent-attachments.md`
      - `$ARTIFACTS_DIR/feedback.json`
      - `git diff origin/main`
      - Production files changed by the implementation attempt

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files.

      **PHASE_1_CHECKPOINT:**
      - [ ] Acceptance criteria are loaded
      - [ ] Changed production files are identified
      - [ ] Validation feedback is interpreted as product symptoms only

      ## Phase 2: REVIEW - Evaluate Implementation Quality

      Evaluate:
      - Does the diff implement every acceptance criterion?
      - Are changed files within the ticket's intended scope?
      - Did the implementation preserve existing architecture and security
        boundaries?
      - Did it avoid test-harness gaming, fake IDs, fixture-specific branches,
        selector-driven UI, generated-file edits, weakened auth, weakened
        validation, and special routes?
      - Are deterministic failures in `feedback.json` addressed as product
        behavior rather than copied test mechanics?
      - Are there obvious risks the next dev attempt should fix before
        validation can be trusted?

      **PHASE_2_CHECKPOINT:**
      - [ ] AC gaps are listed
      - [ ] Scope violations are listed
      - [ ] Test-gaming risks are listed
      - [ ] Required repairs are actionable

      ## Phase 3: WRITE - Save Review Artifact

      Write `$ARTIFACTS_DIR/dev-review-1.json` as valid JSON with this shape:

      ```json
      {
        "passed": true,
        "summary": "short review summary",
        "acceptance_criteria_gaps": [],
        "scope_violations": [],
        "architecture_risks": [],
        "test_gaming_risks": [],
        "required_repairs": []
      }
      ```

      Set `"passed": false` if any required repair remains.

      Each item in `required_repairs` must include:
      - `file`
      - `issue`
      - `required_change`
      - `acceptance_criterion`

      ## Success Criteria

      - **ARTIFACT_WRITTEN**: `$ARTIFACTS_DIR/dev-review-1.json` exists and is
        valid JSON.
      - **AC_REVIEWED**: Every acceptance criterion was checked.
      - **ACTIONABLE**: Every required repair names a file and change.
      - **NO_EDITS**: No repository files were modified by this review.

  - id: parse-dev-review-1
    depends_on: [ review-dev-attempt-1 ]
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-1.json"
      latest="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-1.json"}'
        exit 0
      fi
      cp "$review" "$latest"
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  # ─── Dev attempt 2 + validation gate 2 (only if attempt 1 failed validation) ──
  # Same PreToolUse hook as dev-attempt-1. Reads feedback.json from validate-1.
  - id: dev-attempt-2
    depends_on: [ validate-1, parse-dev-review-1 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30
    prompt: |
      # Repair Task Implementation

      **Input**: `$ARTIFACTS_DIR/feedback.json`

      ---

      ## Your Mission

      Continue implementing the product behavior required by
      `$ARTIFACTS_DIR/task-context.md`. Use `$ARTIFACTS_DIR/feedback.json` to
      infer which ticket requirement or production behavior may still be
      incomplete.

      Validation feedback is a symptom report, not an implementation spec.
      Do not implement behavior solely because it appears in a test failure,
      selector, stack trace, screenshot, fixture name, route, fake ID,
      assertion message, or artifact path.

      ## Phase 1: LOAD - Gather Context

      Read:
      - `$ARTIFACTS_DIR/task-context.md` — task summary, description, and
        acceptance criteria. This is the implementation spec.
      - `$ARTIFACTS_DIR/parent-attachments.md` — project tech stack and
        conventions.
      - `$ARTIFACTS_DIR/feedback.json` — latest validation output. Treat it
        as diagnostic signal only.
      - `$ARTIFACTS_DIR/dev-review-latest.json` — implementation-quality
        review feedback. Treat it as repair guidance within the ticket scope.
      - Production source files needed to understand the failing behavior.

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files.

      **PHASE_1_CHECKPOINT:**
      - [ ] Acceptance criteria are loaded
      - [ ] Current validation failures are translated into product symptoms
      - [ ] No test-shaped artifact has been opened

      ## Phase 2: ANALYZE - Convert Feedback to Product Work

      For each failed gate, identify the likely product behavior that remains
      incomplete. Keep the acceptance criteria as the standard for correctness.

      Ignore validation details that are not product requirements:
      - selectors, data-test IDs, locator text, assertion wording
      - fake IDs, fixture values, seed data names, test names
      - test file paths, stack trace line numbers, screenshots
      - Playwright `test-results`, error-context files, and artifact paths

      If a validation signal appears to require a test-specific workaround,
      do not implement that workaround. Record it in SELF-CHECK as
      `OUT_OF_SCOPE_VALIDATION_SIGNAL` and continue with the production
      behavior supported by the ticket.

      **PHASE_2_CHECKPOINT:**
      - [ ] Each relevant failure is mapped to a ticket requirement or source
        behavior
      - [ ] No planned edit is justified only by visible test mechanics
      - [ ] Unrelated or out-of-scope validation signals are identified

      ## Phase 3: IMPLEMENT - Make Targeted Production Edits

      Edit only production code needed to satisfy the ticket and address
      relevant product-level validation symptoms.

      Forbidden:
      - Reading, creating, modifying, or deleting files under `tests/`, `test/`,
        `e2e/`, `__tests__/`, or matching `*.test.*` / `*.spec.*`
      - Editing test fixtures or test configs: `vitest.config.*`,
        `playwright.config.*`, `jest.config.*`
      - Running test commands: `npm test`, `npm run test*`, `vitest`,
        `playwright`, `jest`, `npx` test runners, or direct
        `node ./node_modules/.bin/...` test runners
      - Editing generated files, generated directories, or validation artifacts
        such as `test-results/`
      - Adding fake IDs, hardcoded fixture behavior, test-only branches,
        selector-driven UI, weakened auth, weakened validation, or special
        routes just because validation output exposed them
      - Using subagents or delegation tools to inspect the codebase

      **PHASE_3_CHECKPOINT:**
      - [ ] Edits are limited to production source files in ticket scope
      - [ ] Each edit maps back to an acceptance criterion or production
        behavior
      - [ ] No validation-harness workaround was added

      ## Phase 4: VERIFY - Self-Check Without Tests

      Review your changed files manually and with non-test commands only when
      appropriate. Do not run test runners.

      SELF-CHECK must include:
      - Requirement mapping: each acceptance criterion and the production
        behavior implemented for it
      - Validation interpretation: product-level symptoms inferred from
        feedback, without selectors, test files, line numbers, screenshots,
        fixture values, or artifact paths
      - Scope check: changed files and why each one is within ticket scope
      - Anti-gaming check: confirm no fake IDs, test selectors, hardcoded
        fixtures, generated-file edits, auth weakening, or test-specific
        branches were added
      - Out-of-scope signals: any validation signal you intentionally did not
        implement because it was not supported by the ticket

      **PHASE_4_CHECKPOINT:**
      - [ ] Relevant product-level feedback has been addressed
      - [ ] Acceptance criteria remain satisfied
      - [ ] No forbidden files or commands were used

      ## Phase 5: COMMIT - Save Work

      Commit the targeted repair on the current branch.

      ## Success Criteria

      - **AC_COMPLETE**: Every acceptance criterion has corresponding
        production behavior.
      - **FEEDBACK_INTERPRETED**: Feedback was translated into product
        symptoms, not copied into test-shaped implementation.
      - **SCOPE_DISCIPLINED**: Every changed file is justified by the ticket
        or existing architecture.
      - **NO_TEST_GAMING**: No visible validation detail was turned into a
        test-specific implementation.
      - **NO_TEST_ACCESS**: No test, fixture, config, generated, or validation
        artifact files were read or modified; no test runner was executed.
      - **COMMITTED**: The repair is committed.

  - id: validate-2
    depends_on: [ dev-attempt-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: review-dev-attempt-2
    depends_on: [ validate-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    context: fresh
    prompt: |
      # Review Implementation Repair

      **Input**: `$ARTIFACTS_DIR/dev-review-latest.json`

      ---

      ## Your Mission

      Review the repaired implementation after the second development attempt.
      Do not edit files. Produce the next durable implementation-quality
      artifact.

      Read:
      - `$ARTIFACTS_DIR/task-context.md`
      - `$ARTIFACTS_DIR/parent-attachments.md`
      - `$ARTIFACTS_DIR/feedback.json`
      - `$ARTIFACTS_DIR/dev-review-latest.json`
      - `git diff origin/main`
      - Production files changed by the implementation attempts

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files.

      Check every acceptance criterion, prior required repair, scope
      discipline, architecture risk, and test-gaming risk.

      Write `$ARTIFACTS_DIR/dev-review-2.json` as valid JSON with this shape:

      ```json
      {
        "passed": true,
        "summary": "short review summary",
        "acceptance_criteria_gaps": [],
        "scope_violations": [],
        "architecture_risks": [],
        "test_gaming_risks": [],
        "required_repairs": []
      }
      ```

      Set `"passed": false` if any required repair remains. Do not modify
      repository files.

  - id: parse-dev-review-2
    depends_on: [ review-dev-attempt-2 ]
    when: "$validate-1.output.passed == 'false' || $parse-dev-review-1.output.passed == 'false'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-2.json"
      latest="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-2.json"}'
        exit 0
      fi
      cp "$review" "$latest"
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  # ─── Last-resort iterative dev loop (only fires when both validates failed) ──
  # Two explicit retries with the cage didn't converge. Drop into a loop node
  # that re-invokes the dev agent up to 5 more times, with task-run-validation.sh
  # as the until_bash terminator. Loop exits as soon as validation passes (exit 0)
  # or hits max_iterations (state: failed → downstream skips through to
  # generate-docs's ANY-passed `when:` clause, which leaves the ticket without a
  # PR; future improvement: surface to a human at that point).
  #
  # CAGE LIMITATION: Archon's loop nodes strip LOOP_NODE_AI_FIELDS, so
  # `denied_tools` and `hooks` defined here would be silently dropped. We
  # accept that — by the time we're here, two cage-enforced attempts already
  # failed; the loop's job is converging on something that passes the gates.
  # The prompt's imperative rules are the only enforcement.
  - id: dev-attempt-loop
    depends_on: [ validate-2, parse-dev-review-2 ]
    when: "$validate-2.output.passed == 'false' || $parse-dev-review-2.output.passed == 'false'"
    context: fresh
    loop:
      max_iterations: 5
      # Two ways to exit the loop, either is sufficient (Archon's loop
      # uses OR semantics: completionDetected = signalDetected || bashComplete):
      #   1. The agent emits <COMPLETE>...</COMPLETE> on its last line
      #      (this is how it says "I'm done writing code for this iteration").
      #   2. The until_bash script runs validation and exits 0.
      #
      # Either trigger ends the loop. A premature COMPLETE (agent says done
      # but validation actually still fails) is caught downstream: the
      # validate-loop node re-runs validation, emits passed=false, and
      # generate-docs's `when:` clause skips the rest of the chain — no
      # broken code gets shipped. If max_iterations is hit with neither
      # path triggering, the loop ends in state: failed and the chain also
      # cleanly exits via cascading skips.
      until: COMPLETE
      until_bash: |
        set -uo pipefail
        bash /home/user/Archon/.archon/scripts/task-run-validation.sh > /dev/null 2>&1
        passed=$(jq -r '.overall // "failed"' "$ARTIFACTS_DIR/feedback.json" 2>/dev/null || echo failed)
        if [ "$passed" = "passed" ]; then
          exit 0
        fi
        exit 1
      prompt: |
        # Retry Task Implementation

        **Input**: `$ARTIFACTS_DIR/feedback.json`

        ---

        ## Your Mission

        Continue implementing the product behavior required by
        `$ARTIFACTS_DIR/task-context.md`. Read the latest
        `$ARTIFACTS_DIR/feedback.json` each iteration, but treat it only as a
        symptom report.

        Passing validation is not the direct objective. The objective is to
        implement the requested product behavior within scope. Use validation
        only to infer which requirement may still be incomplete.

        ## Phase 1: LOAD - Gather Current Context

        Read:
        - `$ARTIFACTS_DIR/task-context.md` — task summary, description, and
          acceptance criteria. This is the implementation spec.
        - `$ARTIFACTS_DIR/parent-attachments.md` — project tech stack and
          conventions.
        - `$ARTIFACTS_DIR/feedback.json` — latest validation output from the
          previous iteration. It is rewritten after each validation pass.
        - `$ARTIFACTS_DIR/dev-review-latest.json` — latest
          implementation-quality review artifact. Address required repairs
          without reading tests or copying validation mechanics.
        - Production source files needed to understand the failing behavior.

        Do not read tests, fixtures, Playwright artifacts, screenshots, or
        error-context files.

        **PHASE_1_CHECKPOINT:**
        - [ ] Acceptance criteria are loaded
        - [ ] Latest feedback is translated into product-level symptoms
        - [ ] No test-shaped artifact has been opened

        ## Phase 2: ANALYZE - Decide What Product Behavior Is Missing

        For each failed gate, map the signal to a likely incomplete product
        behavior. The acceptance criteria remain the standard for correctness.

        Ignore validation details that are not product requirements:
        - selectors, data-test IDs, locator text, assertion wording
        - fake IDs, fixture values, seed data names, test names
        - test file paths, stack trace line numbers, screenshots
        - Playwright `test-results`, error-context files, and artifact paths

        If a validation signal appears to require a test-specific workaround,
        do not implement that workaround. Record it in SELF-CHECK as
        `OUT_OF_SCOPE_VALIDATION_SIGNAL` and continue with the production
        behavior supported by the ticket.

        **PHASE_2_CHECKPOINT:**
        - [ ] Each relevant failure maps to an acceptance criterion or
          production behavior
        - [ ] No planned edit is justified only by visible test mechanics
        - [ ] Unrelated or out-of-scope validation signals are identified

        ## Phase 3: IMPLEMENT - Make Targeted Production Edits

        Edit only production code needed to satisfy the ticket and address
        relevant product-level validation symptoms.

        Forbidden:
        - Reading, creating, modifying, or deleting files under `tests/`,
          `test/`, `e2e/`, `__tests__/`, or matching `*.test.*` / `*.spec.*`
        - Editing test fixtures or test configs: `vitest.config.*`,
          `playwright.config.*`, `jest.config.*`
        - Running test commands: `npm test`, `npm run test*`, `vitest`,
          `playwright`, `jest`, `npx` test runners, or direct
          `node ./node_modules/.bin/...` test runners
        - Editing generated files, generated directories, or validation
          artifacts such as `test-results/`
        - Adding fake IDs, hardcoded fixture behavior, test-only branches,
          selector-driven UI, weakened auth, weakened validation, or special
          routes just because validation output exposed them
        - Using subagents or delegation tools to inspect the codebase

        **PHASE_3_CHECKPOINT:**
        - [ ] Edits are limited to production source files in ticket scope
        - [ ] Each edit maps back to an acceptance criterion or production
          behavior
        - [ ] No validation-harness workaround was added

        ## Phase 4: VERIFY - Self-Check Without Tests

        Review your changed files manually and with non-test commands only
        when appropriate. Do not run test runners.

        SELF-CHECK must include:
        - Requirement mapping: each acceptance criterion and the production
          behavior implemented for it
        - Validation interpretation: product-level symptoms inferred from
          feedback, without selectors, test files, line numbers, screenshots,
          fixture values, or artifact paths
        - Scope check: changed files and why each one is within ticket scope
        - Anti-gaming check: confirm no fake IDs, test selectors, hardcoded
          fixtures, generated-file edits, auth weakening, or test-specific
          branches were added
        - Out-of-scope signals: any validation signal you intentionally did not
          implement because it was not supported by the ticket

        **PHASE_4_CHECKPOINT:**
        - [ ] Relevant product-level feedback has been addressed
        - [ ] Acceptance criteria remain satisfied
        - [ ] No forbidden files or commands were used

        ## Phase 5: COMMIT - Save Work

        Commit the targeted repair on the current branch.

        ## Success Criteria

        - **AC_COMPLETE**: Every acceptance criterion has corresponding
          production behavior.
        - **FEEDBACK_INTERPRETED**: Feedback was translated into product
          symptoms, not copied into test-shaped implementation.
        - **SCOPE_DISCIPLINED**: Every changed file is justified by the ticket
          or existing architecture.
        - **NO_TEST_GAMING**: No visible validation detail was turned into a
          test-specific implementation.
        - **NO_TEST_ACCESS**: No test, fixture, config, generated, or
          validation artifact files were read or modified; no test runner was
          executed.
        - **COMMITTED**: The repair is committed.

        When you have committed and believe your work for this iteration is
        complete, emit `<COMPLETE>done</COMPLETE>` on its own line as the very
        last thing in your response. The pipeline will then run validation; if
        it still fails, you will be re-invoked with fresh feedback.json. If
        you have NOT yet finished writing/committing, do not emit COMPLETE.

  # ─── Materialize a final feedback.json after the loop converges ──
  # The loop's until_bash ran validation many times, but the LAST validation
  # the loop performed only updated feedback.json once. This node re-runs the
  # validation one more time and emits its standard JSON output so generate-docs
  # and downstream gates have a node to reference (`$validate-loop.output.passed`).
  - id: validate-loop
    depends_on: [ dev-attempt-loop ]
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: review-dev-loop
    depends_on: [ validate-loop ]
    when: "$validate-loop.output.passed == 'true'"
    context: fresh
    prompt: |
      # Review Final Loop Implementation

      **Input**: `$ARTIFACTS_DIR/feedback.json`

      ---

      ## Your Mission

      Review the implementation that emerged from the retry loop. Do not edit
      files. Produce the final implementation-quality artifact for downstream
      gating.

      Read:
      - `$ARTIFACTS_DIR/task-context.md`
      - `$ARTIFACTS_DIR/parent-attachments.md`
      - `$ARTIFACTS_DIR/feedback.json`
      - `$ARTIFACTS_DIR/dev-review-latest.json` if present
      - `git diff origin/main`
      - Production files changed by the implementation attempts

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files.

      Check every acceptance criterion, prior required repair, scope
      discipline, architecture risk, and test-gaming risk.

      Write `$ARTIFACTS_DIR/dev-review-loop.json` as valid JSON with this
      shape:

      ```json
      {
        "passed": true,
        "summary": "short review summary",
        "acceptance_criteria_gaps": [],
        "scope_violations": [],
        "architecture_risks": [],
        "test_gaming_risks": [],
        "required_repairs": []
      }
      ```

      Set `"passed": false` if any required repair remains. Do not modify
      repository files.

  - id: parse-dev-review-loop
    depends_on: [ review-dev-loop ]
    when: "$validate-loop.output.passed == 'true'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-loop.json"
      latest="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-loop.json"}'
        exit 0
      fi
      cp "$review" "$latest"
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  - id: implementation-quality-final
    depends_on: [ parse-dev-review-1, parse-dev-review-2, parse-dev-review-loop ]
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      final="$ARTIFACTS_DIR/dev-review-final.json"
      if [ -f "$ARTIFACTS_DIR/dev-review-loop.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-loop.json" "$final"
      elif [ -f "$ARTIFACTS_DIR/dev-review-2.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-2.json" "$final"
      elif [ -f "$ARTIFACTS_DIR/dev-review-1.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-1.json" "$final"
      else
        printf '{"passed":false,"reason":"missing implementation review artifact","required_repairs":[]}\n' > "$final"
      fi
      cp "$final" "$ARTIFACTS_DIR/dev-review-latest.json"
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$final"

  - id: implementation-ready
    depends_on: [ validate-1, validate-2, validate-loop, implementation-quality-final ]
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      validation_passed=false
      if [ "$validate-1.output.passed" = "true" ] || [ "$validate-2.output.passed" = "true" ] || [ "$validate-loop.output.passed" = "true" ]; then
        validation_passed=true
      fi
      quality_passed="$implementation-quality-final.output.passed"
      if [ "$validation_passed" = "true" ] && [ "$quality_passed" = "true" ]; then
        ready=true
      else
        ready=false
      fi
      printf '{"ready":%s,"validation_passed":%s,"implementation_review_passed":%s,"review":"%s"}\n' \
        "$ready" "$validation_passed" "$quality_passed" "$ARTIFACTS_DIR/dev-review-final.json"

  - id: generate-docs
    depends_on: [ implementation-ready ]
    when: "$implementation-ready.output.ready == 'true'"
    context: fresh
    prompt: |
      Your task is to update user-facing documentation to reflect the changes
      on this branch.

      Inputs:
      - `git diff origin/main` — the source changes that need to be
        documented.
      - `$ARTIFACTS_DIR/task-context.md` — the task summary, description, and
        acceptance criteria. Use it to understand the user-visible intent of
        the changes (not just what files moved).
      - `$decode.output.issue_key` — the Jira key to reference in the
        CHANGELOG entry.

      Output:
      - Always create `.changelog/<issue-key>.md` (lowercase issue key,
        e.g. `.changelog/wor-42.md`). Each ticket gets its own fragment
        file — never edit the project's `CHANGELOG.md` directly. A
        release-time script concatenates fragments at version-bump time;
        per-ticket fragments avoid the merge conflicts that would
        otherwise hit every parallel branch trying to add an entry to
        the same shared file.
        Format: a short markdown block with a heading line referencing
        the issue key and a 1–3 sentence description of what shipped
        for users.
      - Update `README.md` only if the changes affect how a user/developer
        sets up or uses the project (new commands, env vars, dependencies,
        setup steps).
      - Update or add entries under `docs/**/*.md` for any
        feature/setting/concept the diff introduces.

      Constraint: write only `.changelog/<issue-key>.md`, `README.md`,
      and `docs/**/*.md`. Do not edit `CHANGELOG.md`. Do not touch
      source, tests, or package files.

      Commit only the docs files you touched.

  - id: open-pr
    depends_on: [ generate-docs ]
    bash: |
      # Push the branch and open a GitHub PR. Posts the PR URL as a Jira comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-open-pr.ts

  - id: verify-pr-ready
    depends_on: [ open-pr ]
    trigger_rule: all_done
    bash: |
      # Guard downstream review/synthesis/merge chain. If open-pr never ran,
      # stop the rest of the DAG from fabricating review output.
      set -euo pipefail
      if [ ! -f "$ARTIFACTS_DIR/pr-info.json" ]; then
        printf '{"ready":"false","reason":"missing_pr_info"}'
        exit 0
      fi
      pr_number="$(jq -r '.pr_number // ""' "$ARTIFACTS_DIR/pr-info.json" 2>/dev/null || echo "")"
      if [ -z "$pr_number" ]; then
        printf '{"ready":"false","reason":"missing_pr_number"}'
        exit 0
      fi
      printf '{"ready":"true","pr_number":"%s"}' "$pr_number"

  # ─── Review setup: write the artifacts the existing reviewer commands expect ──
  # archon-code-review-agent etc. read $ARTIFACTS_DIR/.pr-number and
  # $ARTIFACTS_DIR/review/scope.md. We have pr-info.json + task-context.md;
  # this bridge converts.
  #
  # Note: rebase-on-main now runs BEFORE dev-attempt-1, not here. The branch
  # is already on current main by the time reviewers see it.
  - id: setup-review-context
    depends_on: [ verify-pr-ready ]
    when: "$verify-pr-ready.output.ready == 'true'"
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/review"
      jq -r .pr_number "$ARTIFACTS_DIR/pr-info.json" > "$ARTIFACTS_DIR/.pr-number"
      cat > "$ARTIFACTS_DIR/review/scope.md" <<EOF
      # Review Scope

      **Ticket**: $decode.output.issue_key
      **PR**: #$(cat "$ARTIFACTS_DIR/.pr-number")
      **Branch**: $(git rev-parse --abbrev-ref HEAD)

      ## Changed Files

      $(git diff origin/main --name-only | sed 's/^/- /')

      ## Task Context

      $(cat "$ARTIFACTS_DIR/task-context.md")
      EOF
      printf '\n{"pr_number":"%s","scope_path":"%s"}' \
        "$(cat "$ARTIFACTS_DIR/.pr-number")" \
        "$ARTIFACTS_DIR/review/scope.md"

  # ─── Reviewers fan out in parallel ───────────────────────────────────
  # Four use the existing Archon reviewer commands; one (scope) is custom
  # because the existing archon-pr-review-scope depends on artifacts from
  # the plan-to-pr chain that we don't produce.

  - id: review-scope
    depends_on: [ setup-review-context ]
    context: fresh
    output_format:
      type: object
      properties:
        verdict: { type: string, enum: [APPROVE, REQUEST_CHANGES, NEEDS_DISCUSSION] }
        critical_count: { type: integer }
        high_count: { type: integer }
        medium_count: { type: integer }
        low_count: { type: integer }
      required: [verdict, critical_count, high_count, medium_count, low_count]
    prompt: |
      You are the SCOPE reviewer. Read `$ARTIFACTS_DIR/review/scope.md` and
      look at the PR diff with `git diff origin/main`.

      Evaluate whether the work stayed within scope:
      - **Files in scope**: for each changed file, is it relevant to what the
        ticket asked for? Flag unrelated touches and drive-by edits — when
        someone asked to update a modal, we should not be changing an auth
        route.
      - **AC coverage**: does the diff address each acceptance criterion?
        Flag unimplemented or partial ACs. Flag work that goes BEYOND the
        ACs — extra features the ticket didn't ask for.

      You are NOT judging code quality, security, error handling, or
      documentation — other reviewers cover those.

      Write `$ARTIFACTS_DIR/review/scope-findings.md` following the same
      format the other reviewers use:

      ```markdown
      # Scope Review Findings: PR #{number}

      **Reviewer**: scope-review
      **Date**: {ISO timestamp}
      **Files Reviewed**: {count}

      ## Summary
      {2-3 sentence overview}
      **Verdict**: APPROVE | REQUEST_CHANGES | NEEDS_DISCUSSION

      ## Findings

      ### Finding 1: {Descriptive Title}
      **Severity**: CRITICAL | HIGH | MEDIUM | LOW
      **Category**: scope-creep | unrelated-change | missing-ac | ac-overreach
      **Location**: `{file}:{line}` (or `(plan-level)` for AC concerns)
      **Issue**: {description}
      **Evidence**: `{file path or snippet}`
      **Why This Matters**: {impact}

      ## Statistics
      Total findings: {n}
      - CRITICAL: {n}
      - HIGH: {n}
      - MEDIUM: {n}
      - LOW: {n}
      ```

      Severity guidance:
      - CRITICAL: a critical AC is unimplemented, or files were touched that
        risk breaking unrelated systems.
      - HIGH: an AC is partial, or scope creep is large enough to warrant
        a separate ticket.
      - MEDIUM: small unrelated change snuck in, or AC met loosely.
      - LOW: minor commentary, no real action needed.

      After writing, post to PR:
        gh pr comment "$(cat $ARTIFACTS_DIR/.pr-number)" \
          --body-file "$ARTIFACTS_DIR/review/scope-findings.md"

      Return STRICT JSON only:
        {"verdict":"...","critical_count":N,"high_count":N,"medium_count":N,"low_count":N}

  - id: review-code
    command: archon-code-review-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-error-handling
    command: archon-error-handling-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-docs
    command: archon-docs-impact-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-comment-quality
    command: archon-comment-quality-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: verify-reviewer-artifacts
    depends_on: [ review-scope, review-code, review-error-handling, review-docs, review-comment-quality ]
    trigger_rule: all_done
    when: "$verify-pr-ready.output.ready == 'true'"
    bash: |
      # Synthesize must not run unless at least one reviewer artifact exists.
      set -euo pipefail
      review_dir="$ARTIFACTS_DIR/review"
      mkdir -p "$review_dir"
      shopt -s nullglob
      files=("$review_dir/"*-findings.md)
      shopt -u nullglob
      count="${#files[@]}"
      if [ "${count:-0}" -lt 1 ]; then
        printf '{"has_findings":"false","count":0}'
        exit 0
      fi
      printf '{"has_findings":"true","count":%s}' "$count"

  # ─── Synthesize the five reviewers' artifacts into a consolidated review ──
  # Uses the existing Archon synthesizer command; reads all *-findings.md
  # files, decides APPROVE/REQUEST_CHANGES based on severity thresholds,
  # posts a master review comment to the PR.
  #
  # trigger_rule: all_done — synthesize must read ALL five reviewers'
  # artifacts, so it waits for every reviewer to settle. We use all_done
  # rather than all_success / none_failed_min_one_success because a
  # crashed individual reviewer shouldn't block the chain — the synth
  # command handles missing findings files internally and produces a
  # partial review from whatever DID land. The earlier `one_success`
  # would have let synthesize fire while some reviewers were still
  # running — only safe by accident because all five tend to complete
  # within seconds of each other.
  - id: synthesize
    command: archon-synthesize-review
    depends_on: [ verify-reviewer-artifacts ]
    when: "$verify-reviewer-artifacts.output.has_findings == 'true'"
    context: fresh

  # ─── Parse the synthesizer's verdict into a JSON decision field ──
  # The bundled archon-synthesize-review command emits prose narration on
  # stdout and writes consolidated-review.md to disk — it does NOT emit a
  # JSON `decision` field, so $synthesize.output.decision resolves to ''
  # and downstream `when:` gates would always evaluate false.
  # This bridge node reads the markdown verdict and re-emits it as JSON
  # ({"decision":"approve"|"changes_requested"|"needs_discussion"}) on
  # stdout so the implement-fixes / merge-pr gates can route correctly.
  - id: parse-synthesis
    depends_on: [ synthesize ]
    bash: |
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-parse-synthesis.ts

  # ─── Implement fixes if synthesizer requested changes ──
  # Existing Archon command; reads consolidated-review.md + per-reviewer
  # findings; makes the changes; commits.
  # Same PreToolUse hook as dev nodes (test paths + selective Bash).
  - id: implement-fixes
    # Our own fix-implementer (.archon/commands/defaults/task-implement-fixes.md — bundled), not
    # the bundled archon-implement-review-fixes. The bundled command is built
    # for human-in-the-loop workflows: it fixes only CRITICAL/HIGH and treats
    # MEDIUM/LOW as "for the user to decide." Our pipeline is autonomous, so
    # we want every actual issue (any severity) fixed in the same step,
    # leaving only literal questions ("do you want X or Y?") for humans.
    command: task-implement-fixes
    depends_on: [ parse-synthesis ]
    when: "$verify-pr-ready.output.ready == 'true' && $parse-synthesis.output.decision == 'changes_requested'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30

  # ─── Deterministic quality gate after fixes ──
  # Re-runs lint/typecheck/vitest/playwright. Always exits 0; the JSON output's
  # `passed` field drives the merge gate's `when:` clause below.
  # Only runs when implement-fixes ran (which itself only runs when synthesizer
  # requested changes).
  - id: post-fix-validation
    depends_on: [ implement-fixes ]
    when: "$verify-pr-ready.output.ready == 'true' && $parse-synthesis.output.decision == 'changes_requested'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Merge gate ──
  # Two paths to merge:
  #   1) Synthesizer approved on first read → no fixes needed, no post-validation needed.
  #      synthesize: succeeded, implement-fixes: skipped, post-fix-validation: skipped.
  #   2) Synthesizer requested changes → fixes ran AND post-fix-validation succeeded.
  #      synthesize: succeeded, implement-fixes: succeeded, post-fix-validation: succeeded.
  #
  # If post-fix-validation FAILED (real test failure after fixes), merge-pr's
  # all_done + when clause keeps it from running because validation didn't
  # succeed — neither path is satisfied.
  - id: merge-pr
    depends_on: [ verify-pr-ready, parse-synthesis, implement-fixes, post-fix-validation ]
    trigger_rule: all_done
    # AND binds tighter than ||, so the gate reads as:
    #   synth approved  OR  (synth requested changes AND post-fix passed)
    # The bash itself guards against open-pr having been skipped (no
    # pr-info.json on disk) — keeping that check in the consumer rather
    # than the gate avoids duplicating `$open-pr.output.pr_number != ''`
    # in every OR branch (Archon's condition evaluator has no parentheses).
    when: "$verify-pr-ready.output.ready == 'true' &&
      $parse-synthesis.output.decision == 'approve' ||
      $verify-pr-ready.output.ready == 'true' &&
      $parse-synthesis.output.decision == 'changes_requested' &&
      $post-fix-validation.output.passed == 'true'"
    bash: |
      # Squash-merge the PR, delete the branch, post Jira confirmation.
      set -euo pipefail
      if [ ! -f "$ARTIFACTS_DIR/pr-info.json" ]; then
        echo "No pr-info.json on disk — open-pr did not run, nothing to merge." >&2
        printf '{"merged":"false","reason":"no_pr"}'
        exit 0
      fi
      bun /home/user/Archon/.archon/scripts/task-merge-pr.ts

  - id: transition-to-done
    depends_on: [ merge-pr ]
    bash: |
      # Transition Jira ticket to Done with a final summary comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-transition-to-done.ts

  - id: log-elapsed-on-task
    depends_on: [ transition-to-done ]
    bash: |
      # Worklog the total task-implement elapsed time on the Jira ticket.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export WORKFLOW_NAME="task-implement"
      bun /home/user/Archon/.archon/scripts/jira-log-elapsed.ts
