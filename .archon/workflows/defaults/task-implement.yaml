name: task-implement
description: Implement a Jira task — write code that satisfies the acceptance criteria. After each iteration, deterministic validation runs; on green, generate docs and open a PR.

worktree:
  enabled: true

nodes:
  - id: decode
    bash: |
      # Decode the base64 webhook payload; capture workflow start time for end-of-run worklog.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      date +%s%3N > "$ARTIFACTS_DIR/.workflow-start-ms"
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing JSON payload input");
        }
        let obj;
        try {
          const decoded = Buffer.from(raw, "base64").toString("utf8");
          obj = JSON.parse(decoded);
        } catch {
          obj = JSON.parse(raw);
        }
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"

  - id: write-trigger-artifact
    depends_on: [ decode ]
    bash: |
      # Persist the decoded webhook payload as $ARTIFACTS_DIR/trigger-payload.json.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      out="$ARTIFACTS_DIR/trigger-payload.json"
      printf '%s' $decode.output | bun -e '
        import { writeFileSync, readFileSync } from "node:fs";
        const obj = JSON.parse(readFileSync(0, "utf8"));
        writeFileSync(process.argv[1], JSON.stringify(obj, null, 2));
      ' -- "$out"
      printf '\n{"trigger_payload":"%s"}' "$out"

  - id: fetch-task-context
    depends_on: [ write-trigger-artifact ]
    bash: |
      # Fetch the task from Jira and write task-context.md, parent-epic-key.txt, task.raw.json.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-fetch-task-context.ts

  - id: fetch-epic-tech-context
    depends_on: [ fetch-task-context ]
    bash: |
      # Fetch parent Epic's attachments (TechSpec, DesignDoc, etc.) so the dev agent has full context.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      parent_key="$(cat "$ARTIFACTS_DIR/parent-epic-key.txt" 2>/dev/null || echo "")"
      if [ -z "$parent_key" ]; then
        echo "No parent Epic key — skipping tech context fetch."
        printf '\n{"skipped":"true"}'
        exit 0
      fi
      echo "Fetching parent Epic $parent_key..."
      mkdir -p "$ARTIFACTS_DIR/parent-epic"
      printf '{"event":"transition","issue_key":"%s","project":"%s"}\n' \
        "$parent_key" "$decode.output.project" > "$ARTIFACTS_DIR/parent-epic/trigger-payload.json"
      ARTIFACTS_DIR="$ARTIFACTS_DIR/parent-epic" bun /home/user/Archon/.archon/scripts/jira-fetch-epic.ts > /dev/null
      ARTIFACTS_DIR="$ARTIFACTS_DIR/parent-epic" bun /home/user/Archon/.archon/scripts/jira-fetch-attachments.ts > /dev/null
      cp "$ARTIFACTS_DIR/parent-epic/epic-context.md" "$ARTIFACTS_DIR/parent-epic-context.md"
      cp "$ARTIFACTS_DIR/parent-epic/attachments.md" "$ARTIFACTS_DIR/parent-attachments.md"
      printf '\n{"parent_context":"%s","parent_attachments":"%s"}' \
        "$ARTIFACTS_DIR/parent-epic-context.md" "$ARTIFACTS_DIR/parent-attachments.md"

  # ─── Dev attempt 1 + validation gate 1 ─────────────────────────────────
  # The dev agent has hard tool-permission rules that prevent it from reading,
  # modifying, or running tests. The agent's only contract is "satisfy the ACs."
  # The validation node alone is the authority on whether tests pass.
  - id: dev-attempt-1
    depends_on: [ fetch-epic-tech-context ]
    denied_tools:
      # Cannot read test source
      - "Read(tests/**)"
      - "Read(test/**)"
      - "Read(e2e/**)"
      - "Read(__tests__/**)"
      - "Read(**/*.test.*)"
      - "Read(**/*.spec.*)"
      - "Read(**/vitest.config.*)"
      - "Read(**/playwright.config.*)"
      - "Read(**/jest.config.*)"
      # Cannot enumerate test directories — even seeing filenames leaks
      # which tests exist and is a cheating signal (Glob/LS were our gap)
      - "Glob(tests/**)"
      - "Glob(test/**)"
      - "Glob(e2e/**)"
      - "Glob(__tests__/**)"
      - "Glob(**/*.test.*)"
      - "Glob(**/*.spec.*)"
      - "Glob(**/vitest.config.*)"
      - "Glob(**/playwright.config.*)"
      - "Glob(**/jest.config.*)"
      - "LS(tests)"
      - "LS(test)"
      - "LS(e2e)"
      - "LS(__tests__)"
      # Cannot write test source or test config
      - "Write(tests/**)"
      - "Edit(tests/**)"
      - "Write(test/**)"
      - "Edit(test/**)"
      - "Write(e2e/**)"
      - "Edit(e2e/**)"
      - "Write(__tests__/**)"
      - "Edit(__tests__/**)"
      - "Write(**/*.test.*)"
      - "Edit(**/*.test.*)"
      - "Write(**/*.spec.*)"
      - "Edit(**/*.spec.*)"
      - "Write(**/vitest.config.*)"
      - "Edit(**/vitest.config.*)"
      - "Write(**/playwright.config.*)"
      - "Edit(**/playwright.config.*)"
      - "Write(**/jest.config.*)"
      - "Edit(**/jest.config.*)"
      # Cannot run any test runner or quality gate — those are the validation
      # node's job, not the agent's.
      - "Bash(npm test:*)"
      - "Bash(npm run test*)"
      - "Bash(npm run lint*)"
      - "Bash(npm run typecheck*)"
      - "Bash(npx vitest:*)"
      - "Bash(npx playwright:*)"
      - "Bash(npx jest:*)"
      - "Bash(npx tsc:*)"
      - "Bash(npx eslint:*)"
      - "Bash(vitest:*)"
      - "Bash(playwright:*)"
      - "Bash(jest:*)"
      - "Bash(tsc:*)"
      - "Bash(eslint:*)"
    prompt: |
      Read `$ARTIFACTS_DIR/task-context.md` and write code that satisfies
      its acceptance criteria. Reference `$ARTIFACTS_DIR/parent-attachments.md`
      for the project's tech stack and conventions. Commit when done.

  - id: validate-1
    depends_on: [ dev-attempt-1 ]
    bash: |
      # Deterministic quality gate: lint, typecheck, scoped vitest, scoped playwright.
      # Always exits 0; the JSON output's `passed` field drives the retry decision.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export ISSUE_KEY="$decode.output.issue_key"
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Dev attempt 2 + validation gate 2 (only if attempt 1 failed validation) ──
  # Same denied_tools cage. The agent reads $ARTIFACTS_DIR/feedback.json — which
  # was just written by validate-1 — to learn what failed, then makes another
  # commit fixing those issues.
  - id: dev-attempt-2
    depends_on: [ validate-1 ]
    when: "$validate-1.output.passed == 'false'"
    denied_tools:
      - "Read(tests/**)"
      - "Read(test/**)"
      - "Read(e2e/**)"
      - "Read(__tests__/**)"
      - "Read(**/*.test.*)"
      - "Read(**/*.spec.*)"
      - "Read(**/vitest.config.*)"
      - "Read(**/playwright.config.*)"
      - "Read(**/jest.config.*)"
      - "Glob(tests/**)"
      - "Glob(test/**)"
      - "Glob(e2e/**)"
      - "Glob(__tests__/**)"
      - "Glob(**/*.test.*)"
      - "Glob(**/*.spec.*)"
      - "Glob(**/vitest.config.*)"
      - "Glob(**/playwright.config.*)"
      - "Glob(**/jest.config.*)"
      - "LS(tests)"
      - "LS(test)"
      - "LS(e2e)"
      - "LS(__tests__)"
      - "Write(tests/**)"
      - "Edit(tests/**)"
      - "Write(test/**)"
      - "Edit(test/**)"
      - "Write(e2e/**)"
      - "Edit(e2e/**)"
      - "Write(__tests__/**)"
      - "Edit(__tests__/**)"
      - "Write(**/*.test.*)"
      - "Edit(**/*.test.*)"
      - "Write(**/*.spec.*)"
      - "Edit(**/*.spec.*)"
      - "Write(**/vitest.config.*)"
      - "Edit(**/vitest.config.*)"
      - "Write(**/playwright.config.*)"
      - "Edit(**/playwright.config.*)"
      - "Write(**/jest.config.*)"
      - "Edit(**/jest.config.*)"
      - "Bash(npm test:*)"
      - "Bash(npm run test*)"
      - "Bash(npm run lint*)"
      - "Bash(npm run typecheck*)"
      - "Bash(npx vitest:*)"
      - "Bash(npx playwright:*)"
      - "Bash(npx jest:*)"
      - "Bash(npx tsc:*)"
      - "Bash(npx eslint:*)"
      - "Bash(vitest:*)"
      - "Bash(playwright:*)"
      - "Bash(jest:*)"
      - "Bash(tsc:*)"
      - "Bash(eslint:*)"
    prompt: |
      Read `$ARTIFACTS_DIR/task-context.md` and write code that satisfies
      its acceptance criteria. Reference `$ARTIFACTS_DIR/parent-attachments.md`
      for the project's tech stack and conventions.

      `$ARTIFACTS_DIR/feedback.json` exists — your prior implementation didn't
      fully satisfy the ACs. Read its content to understand what's missing, then
      address it.

      Commit when done.

  - id: validate-2
    depends_on: [ dev-attempt-2 ]
    when: "$validate-1.output.passed == 'false'"
    bash: |
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export ISSUE_KEY="$decode.output.issue_key"
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: generate-docs
    depends_on: [ validate-1, validate-2 ]
    trigger_rule: all_done
    when: "$validate-1.output.passed == 'true' || $validate-2.output.passed
      == 'true'"
    prompt: |
      The implementation for `$decode.output.issue_key` is complete. Update
      user-facing docs to reflect what shipped. Read the diff with
      `git diff origin/main` and `$ARTIFACTS_DIR/task-context.md`.

      You may write only `README.md`, `CHANGELOG.md`, and `docs/**/*.md`.
      Don't touch source, tests, or package files.

      Always add a CHANGELOG entry referencing `$decode.output.issue_key`
      (create the file if missing). Update README only if the changes affect
      a user/developer setting up the project (new commands, env vars,
      dependencies, setup steps).

      Commit only the docs files you touched.

  - id: open-pr
    depends_on: [ generate-docs ]
    bash: |
      # Push the branch and open a GitHub PR. Posts the PR URL as a Jira comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-open-pr.ts

  # ─── Review setup: write the artifacts the existing reviewer commands expect ──
  # archon-code-review-agent etc. read $ARTIFACTS_DIR/.pr-number and
  # $ARTIFACTS_DIR/review/scope.md. We have pr-info.json + task-context.md;
  # this bridge converts.
  - id: setup-review-context
    depends_on: [ open-pr ]
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/review"
      jq -r .pr_number "$ARTIFACTS_DIR/pr-info.json" > "$ARTIFACTS_DIR/.pr-number"
      cat > "$ARTIFACTS_DIR/review/scope.md" <<EOF
      # Review Scope

      **Ticket**: $decode.output.issue_key
      **PR**: #$(cat "$ARTIFACTS_DIR/.pr-number")
      **Branch**: $(git rev-parse --abbrev-ref HEAD)

      ## Changed Files

      $(git diff origin/main --name-only | sed 's/^/- /')

      ## Task Context

      $(cat "$ARTIFACTS_DIR/task-context.md")
      EOF
      printf '\n{"pr_number":"%s","scope_path":"%s"}' \
        "$(cat "$ARTIFACTS_DIR/.pr-number")" \
        "$ARTIFACTS_DIR/review/scope.md"

  # ─── Reviewers fan out in parallel ───────────────────────────────────
  # Four use the existing Archon reviewer commands; one (scope) is custom
  # because the existing archon-pr-review-scope depends on artifacts from
  # the plan-to-pr chain that we don't produce.

  - id: review-scope
    depends_on: [ setup-review-context ]
    output_format:
      type: object
      properties:
        verdict: { type: string, enum: [APPROVE, REQUEST_CHANGES, NEEDS_DISCUSSION] }
        critical_count: { type: integer }
        high_count: { type: integer }
        medium_count: { type: integer }
        low_count: { type: integer }
      required: [verdict, critical_count, high_count, medium_count, low_count]
    prompt: |
      You are the SCOPE reviewer. Read `$ARTIFACTS_DIR/review/scope.md` and
      look at the PR diff with `git diff origin/main`.

      Evaluate whether the work stayed within scope:
      - **Files in scope**: for each changed file, is it relevant to what the
        ticket asked for? Flag unrelated touches and drive-by edits — when
        someone asked to update a modal, we should not be changing an auth
        route.
      - **AC coverage**: does the diff address each acceptance criterion?
        Flag unimplemented or partial ACs. Flag work that goes BEYOND the
        ACs — extra features the ticket didn't ask for.

      You are NOT judging code quality, security, error handling, or
      documentation — other reviewers cover those.

      Write `$ARTIFACTS_DIR/review/scope-findings.md` following the same
      format the other reviewers use:

      ```markdown
      # Scope Review Findings: PR #{number}

      **Reviewer**: scope-review
      **Date**: {ISO timestamp}
      **Files Reviewed**: {count}

      ## Summary
      {2-3 sentence overview}
      **Verdict**: APPROVE | REQUEST_CHANGES | NEEDS_DISCUSSION

      ## Findings

      ### Finding 1: {Descriptive Title}
      **Severity**: CRITICAL | HIGH | MEDIUM | LOW
      **Category**: scope-creep | unrelated-change | missing-ac | ac-overreach
      **Location**: `{file}:{line}` (or `(plan-level)` for AC concerns)
      **Issue**: {description}
      **Evidence**: `{file path or snippet}`
      **Why This Matters**: {impact}

      ## Statistics
      Total findings: {n}
      - CRITICAL: {n}
      - HIGH: {n}
      - MEDIUM: {n}
      - LOW: {n}
      ```

      Severity guidance:
      - CRITICAL: a critical AC is unimplemented, or files were touched that
        risk breaking unrelated systems.
      - HIGH: an AC is partial, or scope creep is large enough to warrant
        a separate ticket.
      - MEDIUM: small unrelated change snuck in, or AC met loosely.
      - LOW: minor commentary, no real action needed.

      After writing, post to PR:
        gh pr comment "$(cat $ARTIFACTS_DIR/.pr-number)" \
          --body-file "$ARTIFACTS_DIR/review/scope-findings.md"

      Return STRICT JSON only:
        {"verdict":"...","critical_count":N,"high_count":N,"medium_count":N,"low_count":N}

  - id: review-code
    command: archon-code-review-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-error-handling
    command: archon-error-handling-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-docs
    command: archon-docs-impact-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-comment-quality
    command: archon-comment-quality-agent
    depends_on: [ setup-review-context ]
    context: fresh

  # ─── Synthesize the five reviewers' artifacts into a consolidated review ──
  # Uses the existing Archon synthesizer command; reads all *-findings.md
  # files, decides APPROVE/REQUEST_CHANGES based on severity thresholds,
  # posts a master review comment to the PR.
  - id: synthesize
    command: archon-synthesize-review
    depends_on: [ review-scope, review-code, review-error-handling, review-docs, review-comment-quality ]
    trigger_rule: one_success
    context: fresh

  # ─── Implement fixes if synthesizer requested changes ──
  # Existing Archon command; reads consolidated-review.md + per-reviewer
  # findings; makes the changes; commits.
  # Same denied_tools cage as the dev nodes: cannot read or modify tests,
  # cannot run test runners. The fix-implementation cannot decide test
  # failures are "pre-existing" because it cannot observe them.
  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [ synthesize ]
    when: "$synthesize.output.decision == 'changes_requested'"
    context: fresh
    denied_tools:
      - "Read(tests/**)"
      - "Read(test/**)"
      - "Read(e2e/**)"
      - "Read(__tests__/**)"
      - "Read(**/*.test.*)"
      - "Read(**/*.spec.*)"
      - "Read(**/vitest.config.*)"
      - "Read(**/playwright.config.*)"
      - "Read(**/jest.config.*)"
      - "Glob(tests/**)"
      - "Glob(test/**)"
      - "Glob(e2e/**)"
      - "Glob(__tests__/**)"
      - "Glob(**/*.test.*)"
      - "Glob(**/*.spec.*)"
      - "Glob(**/vitest.config.*)"
      - "Glob(**/playwright.config.*)"
      - "Glob(**/jest.config.*)"
      - "LS(tests)"
      - "LS(test)"
      - "LS(e2e)"
      - "LS(__tests__)"
      - "Write(tests/**)"
      - "Edit(tests/**)"
      - "Write(test/**)"
      - "Edit(test/**)"
      - "Write(e2e/**)"
      - "Edit(e2e/**)"
      - "Write(__tests__/**)"
      - "Edit(__tests__/**)"
      - "Write(**/*.test.*)"
      - "Edit(**/*.test.*)"
      - "Write(**/*.spec.*)"
      - "Edit(**/*.spec.*)"
      - "Write(**/vitest.config.*)"
      - "Edit(**/vitest.config.*)"
      - "Write(**/playwright.config.*)"
      - "Edit(**/playwright.config.*)"
      - "Write(**/jest.config.*)"
      - "Edit(**/jest.config.*)"
      - "Bash(npm test:*)"
      - "Bash(npm run test*)"
      - "Bash(npm run lint*)"
      - "Bash(npm run typecheck*)"
      - "Bash(npx vitest:*)"
      - "Bash(npx playwright:*)"
      - "Bash(npx jest:*)"
      - "Bash(npx tsc:*)"
      - "Bash(npx eslint:*)"
      - "Bash(vitest:*)"
      - "Bash(playwright:*)"
      - "Bash(jest:*)"
      - "Bash(tsc:*)"
      - "Bash(eslint:*)"

  # ─── Deterministic quality gate after fixes ──
  # Re-runs lint/typecheck/vitest/playwright. Always exits 0; the JSON output's
  # `passed` field drives the merge gate's `when:` clause below.
  # Only runs when implement-fixes ran (which itself only runs when synthesizer
  # requested changes).
  - id: post-fix-validation
    depends_on: [ implement-fixes ]
    when: "$synthesize.output.decision == 'changes_requested'"
    bash: |
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export ISSUE_KEY="$decode.output.issue_key"
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Merge gate ──
  # Two paths to merge:
  #   1) Synthesizer approved on first read → no fixes needed, no post-validation needed.
  #      synthesize: succeeded, implement-fixes: skipped, post-fix-validation: skipped.
  #   2) Synthesizer requested changes → fixes ran AND post-fix-validation succeeded.
  #      synthesize: succeeded, implement-fixes: succeeded, post-fix-validation: succeeded.
  #
  # If post-fix-validation FAILED (real test failure after fixes), merge-pr's
  # all_done + when clause keeps it from running because validation didn't
  # succeed — neither path is satisfied.
  - id: merge-pr
    depends_on: [ synthesize, implement-fixes, post-fix-validation ]
    trigger_rule: all_done
    when: "($synthesize.output.decision == 'approve') ||
      ($synthesize.output.decision == 'changes_requested' &&
       $post-fix-validation.output.passed == 'true')"
    bash: |
      # Squash-merge the PR, delete the branch, post Jira confirmation.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-merge-pr.ts

  - id: transition-to-done
    depends_on: [ merge-pr ]
    bash: |
      # Transition Jira ticket to Done with a final summary comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-transition-to-done.ts

  - id: log-elapsed-on-task
    depends_on: [ transition-to-done ]
    bash: |
      # Worklog the total task-implement elapsed time on the Jira ticket.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export WORKFLOW_NAME="task-implement"
      bun /home/user/Archon/.archon/scripts/jira-log-elapsed.ts
