name: epic-decompose
description: Decompose an Epic into Tasks with dependency planning. Script-driven Jira plumbing; agent-driven planning + per-task authoring.

worktree:
  enabled: true

nodes:
  - id: decode
    bash: |
      # Decode the base64-encoded webhook payload from $ARGUMENTS into JSON for downstream nodes.
      # Also capture the workflow start time for end-of-run worklog reporting.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      date +%s%3N > "$ARTIFACTS_DIR/.workflow-start-ms"
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing JSON payload input");
        }
        let obj;
        try {
          const decoded = Buffer.from(raw, "base64").toString("utf8");
          obj = JSON.parse(decoded);
        } catch {
          obj = JSON.parse(raw);
        }
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"

  # --- Plumbing: write the trigger payload to disk for downstream nodes ---
  - id: write-trigger-artifact
    depends_on: [ decode ]
    bash: |
      # Persist the decoded webhook payload as $ARTIFACTS_DIR/trigger-payload.json.
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      out="$ARTIFACTS_DIR/trigger-payload.json"
      echo "Writing decoded webhook payload to $out..."
      printf '%s' $decode.output | bun -e '
        import { writeFileSync, readFileSync } from "node:fs";
        const obj = JSON.parse(readFileSync(0, "utf8"));
        writeFileSync(process.argv[1], JSON.stringify(obj, null, 2));
      ' -- "$out"
      echo "Trigger payload persisted ($(wc -c < "$out") bytes)."
      printf '\n{"trigger_payload":"%s"}' "$out"

  # --- Plumbing: fetch the Epic from Jira via REST, write epic-context.md + attachment-inventory.json ---
  - id: fetch-epic-ticket
    depends_on: [ write-trigger-artifact ]
    bash: |
      # Fetch the Epic from Jira (REST) and write epic-context.md + attachment-inventory.json.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-fetch-epic.ts

  # --- Plumbing: download all attachments via REST, build attachments.md ---
  - id: fetch-attachment-content
    depends_on: [ fetch-epic-ticket ]
    bash: |
      # Download every Epic attachment (TechSpec, DesignDoc, etc.) and concatenate text into attachments.md.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-fetch-attachments.ts

  # --- Authoring: adversarial plan creation (mark4-style) ---
  # Replaces the original single-shot `build-decomposition-plan-json` node.
  # The chain is: init-state → adversarial-plan loop (generator/evaluator)
  # → stack adviser → design adviser → post-adviser validation → finalize.
  # Output is $ARTIFACTS_DIR/decomposition-plan.json, matching the original
  # contract so all downstream Jira plumbing nodes work unchanged.
  - id: init-adversarial-state
    depends_on: [ fetch-attachment-content ]
    bash: |
      set -eo pipefail
      cat > "$ARTIFACTS_DIR/plan-state.json" <<'JSON'
      {
        "phase": "generating",
        "round": 1,
        "maxRounds": 8,
        "passThreshold": 8,
        "lastEvaluation": null,
        "status": "running"
      }
      JSON
      mkdir -p "$ARTIFACTS_DIR/plan-evaluations"
      printf '{"state":"%s"}\n' "$ARTIFACTS_DIR/plan-state.json"

  # The adversarial-plan loop. Generator and evaluator alternate; loop
  # exits when plan-state.json status flips to "converged" or "maxed-out".
  # Reads $ARTIFACTS_DIR/epic.md + attachments.md produced upstream by
  # fetch-epic-ticket + fetch-attachment-content. Phase 0 tickets capture
  # external preconditions; one-surface-per-ticket sizing; deps wired
  # explicitly; NFR library shared across the plan.
  - id: adversarial-plan
    depends_on: [ init-adversarial-state ]
    idle_timeout: 600000
    effort: high
    loop:
      max_iterations: 20
      fresh_context: true
      until: PLAN_CONVERGED
      until_bash: |
        grep -qE '"status"\s*:\s*"(converged|maxed-out)"' "$ARTIFACTS_DIR/plan-state.json"
      prompt: |
        # Adversarial Plan Creation

        Each iteration is a fresh agent. You play ONE role this iteration,
        determined by the `phase` field in `$ARTIFACTS_DIR/plan-state.json`.
        The two roles are GENERATOR and EVALUATOR. They alternate by round.

        ---

        ## Phase 1 — LOAD

        Read these inputs:
        - `$ARTIFACTS_DIR/plan-state.json` — has `phase`, `round`,
          `maxRounds`, `passThreshold`, `status`. Determines your role.
        - `$ARTIFACTS_DIR/epic-context.md` — the Epic's title, description,
          and Jira metadata fetched upstream.
        - `$ARTIFACTS_DIR/attachments.md` — concatenated content of the
          Epic's attachments (PRD, TechSpec, DesignDoc, StyleGuide, or
          whatever the project provided).
        - If `round > 1`, also read
          `$ARTIFACTS_DIR/plan-evaluations/round-<round-1>.json` (prior
          evaluator's verdict) and `$ARTIFACTS_DIR/plan-current.json`
          (the prior generator's plan).

        **Phase 1 checkpoint:**
        - [ ] You read `plan-state.json` and identified your role from
              `phase`.
        - [ ] You read `epic-context.md` and `attachments.md`.
        - [ ] If round > 1, you read the prior evaluation and prior plan.

        Now jump to whichever role section your phase says.

        ---

        ## ROLE: GENERATOR (phase = "generating")

        ### Phase 2 — PROCESS (generator)

        **Central question:** *Given this Epic and its attachments, produce
        a plan that translates every user story into the right
        surface-aligned tickets, surfaces every external precondition as
        Phase 0, captures every NFR as a project library, and wires every
        cross-ticket dependency explicitly.*

        Everything specific to the project comes from the spec you read.
        You do not invent user stories, NFRs, surfaces, technologies,
        cross-cutting concerns, or external dependencies — you derive
        them from `epic-context.md` + `attachments.md`. If something is
        not in the spec, do not add it.

        #### 2.1 Enumerate user stories

        Read the spec. Enumerate every user story it declares. The spec
        defines the cuts; you respect them. A user story typically has
        an identifier (e.g. US-XX) and acceptance criteria. Capture
        every one.

        #### 2.2 Enumerate NFRs and cross-cutting concerns

        Read the spec for non-functional requirements (privacy,
        performance, accessibility, browser support, security,
        observability, audit logging, internationalization — whatever
        the spec calls out). Enumerate every NFR.

        Also enumerate cross-cutting CODE concerns the spec implies —
        modules or surfaces that many features depend on (e.g. shared
        helpers, validators, prompt-assembly, response filters, shared
        UI primitives, schema definitions). These will become tickets,
        and dependent tickets will reference them.

        Both kinds get authored:
        - NFRs go in `plan.nfrs` as a library of `{id, name,
          applies_to, ac_template}` entries. Per-ticket lowering will
          inline them as ACs.
        - Cross-cutting CODE concerns become foundational tickets that
          dependents list in `depends_on`.

        #### 2.3 Identify the project's tech stack

        Read the spec. Enumerate every technology actively in use —
        frontend framework, build tool, type system, backend, database,
        auth provider, styling, component library, test runner, test
        harness, AI/SDK dependencies, hosting, CI provider. Whatever the
        spec declares.

        Use this list to:
        - Drive Phase 0 (every external service the spec depends on
          becomes a Phase 0 human-input ticket).
        - Drive surface vocabulary (a Convex backend project's
          surfaces include Convex queries/mutations/actions; a Postgres
          project's surfaces include Postgres tables, REST endpoints;
          adapt to what the spec uses).
        - Inform the advisers downstream (they'll author per-technology
          guidelines from the same list).

        #### 2.4 Author Phase 0 — human-input gate

        Phase 0 is a special milestone whose tickets are HUMAN-ONLY.
        The dev pipeline cannot complete them. Each Phase 0 ticket
        represents an external precondition the human must satisfy
        before downstream work can run.

        For each external service, credential, or environment setup the
        spec implies (derive from 2.3), produce one Phase 0 ticket:
        - `task_id`: `P0.1`, `P0.2`, …
        - `milestone`: `phase_0`
        - `human_only`: `true`
        - `title`: short imperative ("Provision <service>", "Configure
          <auth provider>", "Capture <secret>")
        - `summary`: 1-2 sentences — what's needed and why downstream
          tickets need it
        - `acceptance_criteria`: a checklist the human ticks off (each
          AC is something the human verifies, not the agent)
        - `surface`: `human`
        - `applied_nfrs`: empty
        - `depends_on`: empty
        - `playwright_owned`: empty
        - `original_estimate_minutes`: 0 (human time, not agent time)

        Phase 0 covers external preconditions only. It does NOT cover
        in-repo scaffolding (that's a foundation ticket the agent does).

        #### 2.5 Decompose user stories into surface-aligned tickets

        For each user story identified in 2.1, produce one or more
        tickets. The fan-out depends on the surfaces the story needs.

        A "surface" is the ONE primary kind of code change a ticket
        delivers. Examples (not exhaustive — derive from the project's
        stack):
        - One backend mutation / query / action
        - One frontend page / component
        - One schema definition / migration
        - One helper module / pure function library
        - One AI prompt template
        - One configuration change
        - One CI/build script

        Hard rule: **one surface per ticket**. If a user story spans
        backend + frontend + AI, that's three tickets (one per surface),
        wired with `depends_on`.

        Each ticket has:
        - `task_id`: `T1`, `T2`, … in plan order
        - `milestone`: a milestone id you defined in 2.6 (label only,
          not a gate)
        - `source_user_story`: the user story id this ticket implements,
          or `cross-cutting` for foundational/utility tickets that
          enable many stories
        - `human_only`: `false`
        - `surface`: the ONE primary surface this ticket changes —
          chosen from a vocabulary you derive from the project's stack
        - `title`: short, specific, names the surface
        - `summary`: 2-4 sentences
        - `acceptance_criteria`: an array of testable, concrete
          assertions. Each AC stands alone. Be exhaustive — list every
          assertion a reviewer would want to verify.
        - `applied_nfrs`: list of NFR ids (from `plan.nfrs`) that govern
          this ticket's surface
        - `depends_on`: explicit list of upstream `task_id`s, including
          any Phase 0 tickets this work blocks on
        - `playwright_owned`: array of E2E spec filenames this ticket
          owns — feature-owned E2E. Empty for non-user-visible tickets.
        - `decision`: optional string when the plan introduces something
          not fully normalized in the spec ("Inferring <field> on <model>
          — not in spec but required for <reason>"). Surface deviations;
          don't hide them.
        - `suggested_jira_type`: "Task" or "Story"
        - `original_estimate_minutes`: autonomous-agent end-to-end
          estimate

        #### 2.6 Group into milestones (presentation only, not gates)

        Define a small number of milestones for human readability. The
        first is always `phase_0`. After that, name them after the
        capability groupings the project naturally has (derive from the
        spec — what does the spec's release plan say? what are the
        capability boundaries?). Tickets carry a `milestone` label.

        Milestones do NOT enforce ordering. Cross-ticket gating happens
        only via explicit `depends_on`. A ticket in milestone M3 can
        depend on tickets in M2, M1, or P0 — that's expressed in
        `depends_on`, not implied by milestone position.

        #### 2.7 Wire dependencies explicitly

        Every cross-ticket dependency that exists is an explicit
        `depends_on` edge. This is non-negotiable. The evaluator will
        check.

        For each cross-cutting concern you identified in 2.2, find every
        ticket whose work uses it and add the cross-cutting ticket to
        that ticket's `depends_on`.

        For each Phase 0 precondition, find every downstream ticket that
        needs the precondition satisfied and add the P0 ticket to its
        `depends_on`.

        #### 2.8 Feature-owned Playwright

        Every user-visible feature ticket has at least one entry in its
        `playwright_owned` array — a `.spec.ts` filename naming the E2E
        spec the ticket delivers. Feature-owned tests are part of each
        feature's pipeline; they are NOT separate tickets.

        Exception: a single Playwright-infrastructure ticket (test
        runner config, browser matrix, fixtures, mock-mode shim, CI
        wiring) may exist in the foundation milestone. It owns NO
        behavior tests (its `playwright_owned` is empty); it only sets
        up the harness feature tickets use.

        Hard rule: **no standalone "tests for X" tickets.** The
        Playwright-infrastructure ticket is the only test-shaped ticket
        the plan may contain.

        #### 2.9 If round > 1, address every prior objection

        Read `plan-evaluations/round-<round-1>.json`. For each objection,
        identify the specific change you're making to address it. Apply
        the changes. The evaluator will check.

        **Phase 2 checkpoint (generator):**
        - [ ] Every user story enumerated in 2.1 has at least one ticket
              whose `source_user_story` references it.
        - [ ] Every NFR enumerated in 2.2 appears in `plan.nfrs`.
        - [ ] Every external precondition the spec implies has a Phase 0
              ticket.
        - [ ] Every ticket has exactly one `surface` value.
        - [ ] Every cross-cutting concern (from 2.2) has dependents wired
              with explicit `depends_on` edges.
        - [ ] Every user-visible feature ticket has `playwright_owned`
              non-empty.
        - [ ] No standalone "test for X" tickets exist (Playwright
              infrastructure ticket is allowed).
        - [ ] Every `decision` field surfaces a real spec deviation;
              hidden inferences are surfaced not buried.
        - [ ] If round > 1: every prior objection has a specific change.

        ### Phase 3 — GENERATE (generator)

        Author `$ARTIFACTS_DIR/plan-current.json` in this exact shape:

        ```json
        {
          "epic_title": "string",
          "planning_assumptions": ["string"],
          "tech_stack": ["technology-name", ...],
          "milestones": [
            { "id": "phase_0", "label": "Human Setup & Environment Gate" },
            { "id": "M1", "label": "<derived from project>" }
          ],
          "nfrs": [
            {
              "id": "NFR-<short-name>",
              "name": "<human-readable name>",
              "applies_to": "<concrete description of which surfaces this NFR governs>",
              "ac_template": "<the AC text the lowering pass will inline on relevant tickets>"
            }
          ],
          "tasks": [
            {
              "task_id": "P0.1",
              "milestone": "phase_0",
              "human_only": true,
              "title": "...",
              "summary": "...",
              "acceptance_criteria": ["..."],
              "surface": "human",
              "applied_nfrs": [],
              "depends_on": [],
              "playwright_owned": [],
              "decision": null,
              "suggested_jira_type": "Task",
              "original_estimate_minutes": 0
            },
            {
              "task_id": "T1",
              "milestone": "M1",
              "human_only": false,
              "source_user_story": "...",
              "title": "...",
              "summary": "...",
              "acceptance_criteria": ["...", "..."],
              "surface": "<derived from project's stack>",
              "applied_nfrs": ["NFR-..."],
              "depends_on": ["P0.1", "P0.5"],
              "playwright_owned": [],
              "decision": null,
              "suggested_jira_type": "Task",
              "original_estimate_minutes": 30
            }
          ]
        }
        ```

        Tasks are listed in plan order; task IDs are unique across the
        whole plan.

        ### Phase 4 — COMMIT (generator)

        Write the JSON to `$ARTIFACTS_DIR/plan-current.json` (pretty
        JSON, 2-space indent). Verify on disk:
        - File size > 0
        - Parses
        - Top-level has `epic_title`, `tech_stack`, `milestones`,
          `nfrs`, `tasks`
        - Every task has all required fields
        - Every task's `milestone` references an entry in `milestones[]`
        - Every NFR id in any task's `applied_nfrs` references an entry
          in `nfrs[]`
        - Every `task_id` referenced in any `depends_on` exists

        Update `$ARTIFACTS_DIR/plan-state.json`: set
        `"phase": "evaluating"`. Other fields unchanged.

        **Phase 4 checkpoint (generator):**
        - [ ] `plan-current.json` is valid JSON with all required fields.
        - [ ] Every cross-reference (milestone IDs, NFR IDs, depends_on)
              resolves.
        - [ ] `plan-state.json` has `phase: evaluating`.

        ### Phase 5 — REPORT (generator)

        Output one line: `Generated plan v<round>: <P0_count> Phase-0
        human tickets, <feature_count> feature tickets across <M_count>
        milestones, <NFR_count> NFRs.` Do NOT emit
        `<promise>PLAN_CONVERGED</promise>`.

        ---

        ## ROLE: EVALUATOR (phase = "evaluating")

        ### Phase 2 — PROCESS (evaluator)

        You are an adversarial reviewer. Your job is to BREAK the plan.
        You are not helpful. Be precise and specific.

        Read `$ARTIFACTS_DIR/plan-current.json` and the spec
        (`epic-context.md` + `attachments.md`).

        **Walk the plan in THREE focused passes, in order.** Each pass
        focuses on a single category of concerns. Score the
        category's dimensions and write objections for that pass before
        moving on. This sequencing prevents attention from fragmenting
        across 13 dimensions simultaneously.

        Each dimension is scored 1-10, except where marked conditional.

        ---

        #### Pass 1 — COVERAGE (3 dimensions)

        Walk the spec and the plan side-by-side. Focus only on whether
        the plan covers what the spec asks for.

        - **user_story_coverage** — enumerate every user story in the
          spec. For each, verify at least one ticket has a
          `source_user_story` referencing it. Any user story with zero
          tickets is a coverage gap.

        - **user_story_fanout** — for each user story that produces
          multiple tickets, are they cleanly split by surface (one
          backend, one frontend, one AI action) rather than
          mixed-domain? A user story whose tickets each carry one
          `surface` is well-decomposed.

        - **nfr_application** — for every NFR captured in `plan.nfrs`,
          find every ticket whose `surface` is governed by the NFR's
          `applies_to`. Each such ticket should have the NFR id in its
          `applied_nfrs`. Missing applications are objections. (Note:
          NFR library completeness — whether every spec NFR was even
          captured into `plan.nfrs` in the first place — is checked in
          Pass 2 under `nfr_completeness`; here we verify application
          of what's in the library.)

        Write objections for any gaps you find before moving to Pass 2.

        ---

        #### Pass 2 — STRUCTURE (4 dimensions)

        Walk the plan and check structural integrity. Do not re-read
        the spec for product behavior here; you're checking the plan's
        internal shape.

        - **nfr_completeness** — enumerate every NFR in the spec.
          For each, verify it has an entry in `plan.nfrs`. Any missing
          NFR is a library gap.

        - **phase_0_completeness** — for every external service /
          credential / environment dependency the spec mentions, verify
          a Phase 0 ticket exists, AND that ticket actually verifies
          the setup rather than merely naming the service. A real
          Phase 0 ticket has all three of:
            (a) the human action specified
            (b) the required secret/config artifact named
            (c) a downstream verification surface that proves the setup
                works (smoke check, dev-command-runs, test-harness
                proven with a real test).
          A Phase 0 ticket whose ACs only name the service without
          verification is fake; flag it.

        - **sizing** — every ticket has exactly one `surface` value.
          Any ticket whose ACs imply work spanning multiple surfaces is
          a sizing violation. Flag it.

        - **dependency_completeness** — evaluated for obvious blockers,
          cycles, missing cross-cutting prerequisites, and Phase 0
          gating. Walk every ticket; check that cross-cutting concerns
          (state machine, prompt assembly, privacy filter, shared UI
          primitives, schema, auth helpers, template data model, etc.
          — whatever the project's cross-cutting set is) have their
          dependents wired with explicit `depends_on` edges, that
          Phase 0 tickets are listed as `depends_on` for any ticket
          that needs the precondition satisfied, and that no
          `depends_on` chain forms a cycle. Phantom dependencies are
          also objections.

          **Do NOT require every fine-grained call-site dependency to
          be perfect at plan stage.** Downstream ticket creation
          refines each ticket's dependency list by inspecting that
          ticket in isolation with its full Contract symbols available.
          A missing edge between two tickets that just happen to call
          each other's functions is acceptable at plan stage; a
          missing edge to a cross-cutting concern, a missing Phase 0
          dependency, or a cycle is not.

        Write objections for any gaps you find before moving to Pass 3.

        ---

        #### Pass 3 — QUALITY (5 dimensions; 2 conditional)

        Walk the plan with focus on testing realism, design fidelity,
        privacy/security, and decision surfacing. The first two
        dimensions are conditional.

        - **playwright_ownership** — every user-visible feature ticket
          has non-empty `playwright_owned`. The Playwright-infrastructure
          ticket has empty `playwright_owned` and exists exactly once.

        - **no_standalone_test_tickets** — no ticket exists whose
          purpose is "tests for X" or "test suite for Y." Tests are
          owned by the feature ticket. The single Playwright-infra
          ticket is the only test-shaped exception.

        - **testing_realism** — for each runtime / database / auth /
          server / framework / generated SDK surface, does the plan
          require the official or stack-appropriate test harness,
          emulator, framework test client, or provider test mode rather
          than mocking the primary application runtime? Walk every
          ticket whose `surface` touches a runtime; check the testing
          ACs; flag any ticket that mocks the runtime under test when a
          realistic harness is available. Mocks at true external-service
          boundaries (third-party APIs, payment providers) are
          appropriate and should not be flagged.

        - **design_fidelity** — *conditional: applicable only when the
          input docs include design / UX / style guide content.* If
          applicable: every user-visible ticket should carry the
          relevant visual language, tokens, accessibility, responsive
          behavior, and loading/error/empty-state requirements as ACs.
          If the input has no design source, score `not_applicable`.

        - **privacy_security_fidelity** — *conditional: applicable only
          when the input docs include privacy / security / permissions
          / data isolation / compliance / auditability / safety
          requirements.* If applicable: the plan must represent these
          across data access, runtime, UI, and tests. If the input has
          no such requirements, score `not_applicable`.

        - **decisions_surfaced** — every concept the plan introduces
          that the spec doesn't explicitly state has a `decision` field
          on the relevant ticket explaining the inference. Hidden
          inferences (added fields, statuses, behaviors not in the
          spec) without `decision` notes are objections.

        Write objections for any gaps you find.

        ---

        Score honestly. Do NOT grade on a curve. 8 = "genuinely meets
        the bar." Below that is a real problem. `not_applicable` is a
        valid score for the conditional dimensions and does NOT count
        against the pass threshold.

        **Only dimensions explicitly marked conditional may be scored
        `not_applicable`.** All other dimensions must receive a numeric
        score. The conditional dimensions are exactly two:
        `design_fidelity` and `privacy_security_fidelity`. Every other
        dimension must receive a 1-10 integer. If you find yourself
        wanting to mark a non-conditional dimension as `not_applicable`
        because the project surface is small or the requirement is
        unclear, score it on what's there (a tiny set of relevant
        tickets still has measurable coverage) — don't dodge.

        ### Phase 3 — GENERATE (evaluator)

        Write `$ARTIFACTS_DIR/plan-evaluations/round-<round>.json`:

        ```json
        {
          "round": <N>,
          "scores": {
            "user_story_coverage": 9,
            "user_story_fanout": 8,
            "nfr_completeness": 9,
            "nfr_application": 7,
            "phase_0_completeness": 8,
            "sizing": 8,
            "dependency_completeness": 7,
            "playwright_ownership": 8,
            "no_standalone_test_tickets": 10,
            "testing_realism": 8,
            "design_fidelity": 8,
            "privacy_security_fidelity": "not_applicable",
            "decisions_surfaced": 9
          },
          "passed": false,
          "objections": [
            {
              "dimension": "dependency_completeness",
              "task_ids": ["..."],
              "issue": "Specific finding with copy-pasteable detail.",
              "fix": "What the generator should change."
            }
          ],
          "summary": "One paragraph: what's good, what must change."
        }
        ```

        `passed` is `true` ONLY if every applicable score >=
        passThreshold AND objections is empty. `not_applicable` scores
        on the conditional dimensions (`design_fidelity`,
        `privacy_security_fidelity`) are not gating.

        ### Phase 4 — COMMIT (evaluator)

        Write the evaluation. Verify it parses.

        Update `$ARTIFACTS_DIR/plan-state.json`:
        - If passed: `phase: "converged"`, `status: "converged"`. Copy
          `plan-current.json` to `plan-final.json`.
        - If failed and round < maxRounds: `phase: "generating"`,
          increment round.
        - If failed and round >= maxRounds: `phase: "maxed-out"`,
          `status: "maxed-out"`. Copy `plan-current.json` to
          `plan-final.json` (best effort).

        **Phase 4 checkpoint (evaluator):**
        - [ ] Evaluation JSON written and valid.
        - [ ] `plan-state.json` updated.
        - [ ] If converged or maxed-out, `plan-final.json` exists.

        ### Phase 5 — REPORT (evaluator)

        If `status` is `converged` or `maxed-out`, output
        `<promise>PLAN_CONVERGED</promise>` as the very last line.
        Otherwise output a one-line status (`Round <N> evaluation:
        passed=<bool>, <K> objections.`) and do NOT emit the completion
        signal.

  # --- Authoring: stack adviser pass (mutates plan-current.json) ---
  - id: stack-adviser-prep
    depends_on: [ adversarial-plan ]
    bash: |
      set -eo pipefail
      cp "$ARTIFACTS_DIR/plan-final.json" "$ARTIFACTS_DIR/plan-current.json"
      printf '{"plan_current":"%s"}\n' "$ARTIFACTS_DIR/plan-current.json"

  - id: stack-adviser-call
    depends_on: [ stack-adviser-prep ]
    context: fresh
    effort: max
    command: archon-v2-stack-adviser

  # --- Authoring: design adviser pass (mutates plan-current.json) ---
  - id: design-adviser-call
    depends_on: [ stack-adviser-call ]
    context: fresh
    effort: max
    command: archon-v2-design-adviser

  # --- Plumbing: post-adviser validation ---
  # The advisers mutate plan-current.json in place; this node verifies
  # they didn't introduce drift, drop tasks, or break cross-references.
  - id: post-adviser-validation
    depends_on: [ design-adviser-call ]
    bash: |
      set -eo pipefail
      bun -e '
        import { readFileSync } from "node:fs";

        const ARTIFACTS_DIR = process.env.ARTIFACTS_DIR;
        const finalPath = `${ARTIFACTS_DIR}/plan-final.json`;
        const currentPath = `${ARTIFACTS_DIR}/plan-current.json`;

        const errors = [];

        let pre, post;
        try { pre = JSON.parse(readFileSync(finalPath, "utf8")); }
        catch (e) { errors.push(`plan-final.json missing or unparseable: ${e.message}`); }
        try { post = JSON.parse(readFileSync(currentPath, "utf8")); }
        catch (e) { errors.push(`plan-current.json missing or unparseable: ${e.message}`); }

        if (errors.length > 0) {
          for (const err of errors) console.error("FAIL:", err);
          process.exit(1);
        }

        for (const field of ["epic_title", "milestones", "nfrs", "tasks"]) {
          if (!(field in post)) errors.push(`top-level field "${field}" missing from post-adviser plan`);
        }

        if (!post.stack_rules || typeof post.stack_rules !== "object") {
          errors.push(`stack_rules missing or not an object after stack adviser pass`);
        }
        if (!post.design_rules || typeof post.design_rules !== "object") {
          errors.push(`design_rules missing or not an object after design adviser pass`);
        }

        const preTaskIds = new Set((pre.tasks || []).map(t => t.task_id));
        const postTaskIds = new Set((post.tasks || []).map(t => t.task_id));
        if (preTaskIds.size !== postTaskIds.size) {
          errors.push(`task count drifted: pre=${preTaskIds.size} post=${postTaskIds.size}`);
        }
        for (const id of preTaskIds) if (!postTaskIds.has(id)) errors.push(`task ${id} present in plan-final.json but missing post-adviser`);
        for (const id of postTaskIds) if (!preTaskIds.has(id)) errors.push(`task ${id} added post-adviser (advisers should not add tasks)`);

        const preById = new Map((pre.tasks || []).map(t => [t.task_id, t]));
        for (const postTask of (post.tasks || [])) {
          const preTask = preById.get(postTask.task_id);
          if (!preTask) continue;
          const preACs = JSON.stringify(preTask.acceptance_criteria || []);
          const postACs = JSON.stringify(postTask.acceptance_criteria || []);
          if (preACs !== postACs) errors.push(`task ${postTask.task_id}: acceptance_criteria mutated by advisers`);
        }

        const milestoneIds = new Set((post.milestones || []).map(m => m.id));
        const nfrIds = new Set((post.nfrs || []).map(n => n.id));
        for (const t of (post.tasks || [])) {
          if (t.milestone && !milestoneIds.has(t.milestone)) errors.push(`task ${t.task_id}: milestone "${t.milestone}" not in milestones[]`);
          for (const nfrId of (t.applied_nfrs || [])) if (!nfrIds.has(nfrId)) errors.push(`task ${t.task_id}: applied NFR "${nfrId}" not in nfrs[]`);
          for (const dep of (t.depends_on || [])) if (!postTaskIds.has(dep)) errors.push(`task ${t.task_id}: depends_on "${dep}" not in tasks[]`);
        }

        if (errors.length > 0) {
          console.error("Post-adviser validation FAILED:");
          for (const err of errors) console.error("  -", err);
          process.exit(1);
        }

        const summary = {
          ok: true,
          tasks: postTaskIds.size,
          stack_rule_sections: Object.keys(post.stack_rules || {}).length,
          design_rule_sections: Object.keys(post.design_rules || {}).length,
          milestones: milestoneIds.size,
          nfrs: nfrIds.size,
        };
        process.stdout.write(JSON.stringify(summary));
      '

  # --- Plumbing: finalize plan artifact for downstream Jira plumbing ---
  # The legacy pipeline expects `$ARTIFACTS_DIR/decomposition-plan.json`.
  # The adviser-enriched plan lives in `plan-current.json` (the advisers
  # mutated it in place after copying from plan-final.json). Snapshot it
  # as `plan-enriched.json` for traceability, then copy to the contract
  # path so existing nodes (render-plan-md, process-tasks loop, etc.)
  # continue to work unchanged.
  - id: finalize-decomposition-plan
    depends_on: [ post-adviser-validation ]
    bash: |
      set -eo pipefail
      cp "$ARTIFACTS_DIR/plan-current.json" "$ARTIFACTS_DIR/plan-enriched.json"
      cp "$ARTIFACTS_DIR/plan-current.json" "$ARTIFACTS_DIR/decomposition-plan.json"
      printf '{"plan_path":"%s"}\n' "$ARTIFACTS_DIR/decomposition-plan.json"

  # --- Plumbing: render plan JSON to plan markdown for human readability ---
  - id: build-decomposition-plan-md
    depends_on: [ finalize-decomposition-plan ]
    bash: |
      # Deterministically render decomposition-plan.json as a human-readable markdown plan.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-render-plan-md.ts

  # --- Plumbing: upload plan markdown to Epic + post confirmation comment ---
  - id: attach-plan-to-epic
    depends_on: [ build-decomposition-plan-md ]
    bash: |
      # Upload decomposition-plan.md as a Jira attachment on the Epic and post a confirmation comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-attach-plan.ts

  # --- Plumbing: ensure keymap exists ---
  - id: init-keymap
    depends_on: [ attach-plan-to-epic ]
    bash: |
      # Initialize empty $ARTIFACTS_DIR/task-keymap.json if missing — keymap drives loop progress + downstream linking.
      set -euo pipefail
      keymap="$ARTIFACTS_DIR/task-keymap.json"
      if [ ! -f "$keymap" ]; then
        echo '{}' > "$keymap"
        echo "Initialized empty keymap at $keymap. The process-tasks loop will populate it one entry per iteration."
      else
        existing_count=$(bun -e 'import { readFileSync } from "node:fs"; console.log(Object.keys(JSON.parse(readFileSync(process.argv[1], "utf8"))).length)' -- "$keymap")
        echo "Found existing keymap at $keymap with $existing_count entries — workflow is resuming or being re-run."
      fi
      printf '\n{"keymap_path":"%s"}' "$keymap"

  # --- Authoring: per-task ticket creation. Agent composes description, calls jira-tool createIssue. ---
  - id: process-tasks
    depends_on: [ init-keymap ]
    loop:
      # 100 covers any realistic Epic. Plans typically run 30-60 tasks; the cap is a
      # runaway-loop safety, not a planned upper bound. If a future Epic ever exceeds
      # this, raise it or split the Epic into multiple decompositions.
      max_iterations: 100
      fresh_context: true
      until: COMPLETE
      prompt: |
        You are creating Jira Tasks under an Epic, one per iteration.
        Each iteration runs in a FRESH session with no memory of previous iterations.
        State lives on disk; read it before acting.

        Inputs (read these every iteration):
        - `$ARTIFACTS_DIR/trigger-payload.json` — has `issue_key` (Epic key), `project`.
        - `$ARTIFACTS_DIR/decomposition-plan.json` — has `tasks[]` with `task_id`,
          `title`, `summary`, `acceptance_criteria[]`, `depends_on[]`,
          `suggested_jira_type`.
        - `$ARTIFACTS_DIR/epic-context.md` and `$ARTIFACTS_DIR/attachments.md` —
          source material from the Epic. Use to enrich descriptions where helpful.
        - `$ARTIFACTS_DIR/task-keymap.json` — map of `task_id` → Jira issue key
          for tasks already created. Empty `{}` on first iteration.

        Steps for THIS iteration:

        1. Read the keymap. Read the plan. Find the FIRST task in plan order
           whose `task_id` is NOT a key in the keymap. Call it T.

        2. If every task in the plan already has a keymap entry, output
           `<promise>COMPLETE</promise>` and stop. Do nothing else.

        3. Compose the Jira description for T as markdown. Use this structure:
           - One opening paragraph (2-4 sentences) restating T's purpose in
             plain language, grounded in the Epic context. Not a verbatim copy
             of T.summary; explain why this task exists.
           - `## Acceptance Criteria` — bulleted list of T.acceptance_criteria.
           - `## Implementation Notes` — anything from the Epic context or
             attachments (TechSpec, DesignDoc) that the test-gen agent or
             implementer should know. Mention the relevant tech stack, file
             areas, or design constraints discoverable from the source
             material. Keep it specific and short.
           - `## Test-Gen Brief` — translate the acceptance criteria into a
             testing approach. Per-AC: what kind of test (unit, integration,
             E2E), what to assert, what fixtures are needed. Be concrete.
           - `## Traceability` — one line: "Decomposed from Epic
             `<epic_key>` plan task_id `<T.task_id>`." Then if `depends_on`
             is non-empty, list the plan task_ids it depends on (NOT Jira
             keys — those will become Blocks links in a later step).

        4. Create the Jira issue. Use TWO files — markdown body in its own
           `.md` file, JSON request that references it. This keeps the
           markdown clean (no JSON-string escaping of newlines / backticks /
           quotes).

           a. Ensure the temp directory exists:
                  mkdir -p "$ARTIFACTS_DIR/.tmp"
           b. Use the Write tool to write the composed markdown body
              (the prose from step 3) to
              `$ARTIFACTS_DIR/.tmp/<T.task_id>-description.md`.
              Write the markdown verbatim — no JSON, no escaping, just the
              markdown. Headings, paragraphs, bullets, code blocks all OK.
           c. Use the Write tool to write the request JSON to
              `$ARTIFACTS_DIR/.tmp/jira-create.json`. Single-line JSON is
              fine here because there is no multi-line content in the JSON:

              {
                "action": "createIssue",
                "project": "<project key from trigger-payload.json>",
                "summary": "<T.title>",
                "issuetype": "<T.suggested_jira_type>",
                "parentKey": "<Epic key from trigger-payload.json>",
                "descriptionMarkdownFile": "<absolute path to the .md file from step 4b>",
                "labels": ["archon-blocked-pending"],
                "originalEstimateMinutes": <T.original_estimate_minutes>
              }

           d. Run the tool with the input file path in the env var:
                  JIRA_TOOL_INPUT_FILE=$ARTIFACTS_DIR/.tmp/jira-create.json \
                    bun /home/user/Archon/.archon/scripts/jira-tool.js
           e. The script's stdout is JSON of shape
              `{"ok": true, "action": "createIssue", "result": {"issueKey": "..."}}`.
              Parse it. Capture `result.issueKey` — that is the new Jira key
              for T.

           If the script returns `{"ok": false, ...}` or exits non-zero,
           stop the iteration with an error so the workflow surfaces it.
           Do not silently retry.

        5. Update the keymap. Read `$ARTIFACTS_DIR/task-keymap.json`, parse it,
           add `{"<T.task_id>": "<new Jira key>"}`, write it back as pretty
           JSON (2-space indent). Read-modify-write atomically.

           AFTER WRITING, verify the keymap is on disk: run
           `cat $ARTIFACTS_DIR/task-keymap.json` via the Bash tool and
           confirm the new entry is present. Downstream nodes depend on
           this file existing.

        6. Add a confirmation comment on the new Jira issue. Same file-input
           pattern:

           a. Write to `$ARTIFACTS_DIR/.tmp/jira-comment.json`:

              {
                "action": "addComment",
                "issueKey": "<new Jira key>",
                "text": "Created from Epic <epic_key> decomposition, plan task_id <T.task_id>. Currently labeled archon-blocked-pending; will be unblocked once dependency links are in place."
              }

           b. Run:
                  JIRA_TOOL_INPUT_FILE=$ARTIFACTS_DIR/.tmp/jira-comment.json \
                    bun /home/user/Archon/.archon/scripts/jira-tool.js

        7. Output a one-line status: `Created <T.task_id> as <Jira key>.`
           Do NOT output `<promise>COMPLETE</promise>` on this iteration —
           you have only created one task, and the loop should run again.

        Hard rules:
        - Create exactly ONE Jira issue per iteration. Never two.
        - Never invent task_ids that aren't in the plan.
        - Never modify decomposition-plan.json.
        - Never strip the `archon-blocked-pending` label here; later nodes do that.

        Narrate as you go. Tell the user:
          - which task_id you picked and its title
          - a one-sentence preview of the description you composed
          - the Jira key the API returned
          - confirmation that the keymap was updated
          - confirmation that the comment was posted
        The user is watching live and wants visibility into each iteration.
        End the iteration with the one-line status from step 7 (or with
        `<promise>COMPLETE</promise>` if step 2 short-circuits).

        Previous iteration output (empty on first):
        $LOOP_PREV_OUTPUT

  # --- Plumbing: create Blocks links between dependent and blocker tasks ---
  - id: create-blocks-links
    depends_on: [ process-tasks ]
    bash: |
      # Walk the plan's depends_on graph and create Jira Blocks links between created tasks.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-create-blocks-links.ts

  # --- Plumbing: strip label and transition root tasks (no blockers) to Selected for Development ---
  - id: unblock-roots
    depends_on: [ create-blocks-links ]
    bash: |
      # For tasks with no declared blockers: remove archon-blocked-pending label and transition to Selected for Development.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-unblock-roots.ts

  # --- Plumbing: strip label from non-root tasks (they remain in Backlog awaiting their blockers) ---
  - id: unstick-rest
    depends_on: [ unblock-roots ]
    bash: |
      # For tasks with declared blockers: remove archon-blocked-pending label only (stay in Backlog until blockers Done).
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-unstick-rest.ts

  # --- Plumbing: post final summary comment on Epic ---
  - id: final-comment
    depends_on: [ unstick-rest ]
    bash: |
      # Post a final summary comment on the Epic: tasks created, links made, roots transitioned.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/jira-final-comment.ts

  # --- Plumbing: log total workflow elapsed time as a worklog on the Epic ---
  - id: log-elapsed-on-epic
    depends_on: [ final-comment ]
    bash: |
      # Compute the workflow's total elapsed time and log it to the Epic via Jira worklog.
      # Feeds Jira's standard time-tracking reports so autonomous effort is visible alongside human work.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export WORKFLOW_NAME="epic-decompose"
      bun /home/user/Archon/.archon/scripts/jira-log-elapsed.ts
