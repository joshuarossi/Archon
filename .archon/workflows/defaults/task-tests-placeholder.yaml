name: task-tests-placeholder
description: Jira placeholder workflow for Task creation test setup.

worktree:
  enabled: true

nodes:
  - id: decode
    bash: |
      set -euo pipefail
      bun -e '
        const raw = process.argv[1];
        if (!raw) {
          throw new Error("Missing JSON payload input");
        }
        let obj;
        try {
          const decoded = Buffer.from(raw, "base64").toString("utf8");
          obj = JSON.parse(decoded);
        } catch {
          obj = JSON.parse(raw);
        }
        process.stdout.write(JSON.stringify(obj));
      ' -- "$ARGUMENTS"

  - id: task-tests-placeholder
    depends_on: [ decode ]
    context: fresh
    mcp: /home/user/Archon/.archon/mcp/atlassian.json
    prompt: |
      You are the Jira test-creation placeholder handler.
      Use Atlassian MCP tools explicitly.

      Preferred tool names (use these exact names when available):
      - Atlassian:fetch
      - Atlassian:transitionJiraIssue
      - Atlassian:addCommentToJiraIssue
      - Atlassian:addWorklogToJiraIssue

      If transition/comment tool names differ in this MCP server, first inspect available
      Atlassian:* tools and then use the equivalent Jira transition/comment tools.

      Trigger payload:
      $decode.output

      Do exactly these steps:

      1) Transition the task from "Backlog" to "Selected for Development".
      2) Add a Jira comment on Task `$decode.output.issue_key` with this exact message:
         "Placeholder: created tests for this task."
      3) Verify the comment is visible on the task and post a short confirmation comment.
      4) Transition the task from "Selected for Development" to "In Progress".
      5) Post a final short comment confirming both transitions completed.

      Important:
      - Keep this run focused on test placeholder + transitions only.
      - The move to "In Progress" is intentional to trigger the next webhook-driven handler.
